function bindViewEvents(){
  // home nav cards
  document.querySelectorAll('[data-goto]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ state.view = btn.dataset.goto; render(); });
  });

  // papers
  const paperSearchInput = document.getElementById('paper-search');
  if(paperSearchInput) paperSearchInput.addEventListener('input', (e)=>{
    state.paperSearch = e.target.value;
    render();
    const el = document.getElementById('paper-search');
    if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
  });
  const paperSearchClear = document.getElementById('paper-search-clear');
  if(paperSearchClear) paperSearchClear.addEventListener('click', ()=>{ state.paperSearch=''; render(); });

  const addPaperFolderBtn = document.getElementById('add-paper-folder');
  if(addPaperFolderBtn) addPaperFolderBtn.addEventListener('click', ()=> promptCreateFolder('papers', ALL_ID));
  const addPaperSubfolderBtn = document.getElementById('add-paper-subfolder');
  if(addPaperSubfolderBtn) addPaperSubfolderBtn.addEventListener('click', ()=> promptCreateFolder('papers', state.activePaperFolder));

  const paperUploadBtn = document.getElementById('paper-upload-btn');
  const paperFileInput = document.getElementById('paper-file-input');
  if(paperUploadBtn) paperUploadBtn.addEventListener('click', ()=> paperFileInput.click());
  if(paperFileInput) paperFileInput.addEventListener('change', async (e)=>{
    const folderId = state.activePaperFolder;
    for(const file of Array.from(e.target.files)){
      await addFileToStore('papers', folderId, file);
    }
    e.target.value = '';
    render();
  });

  // videos
  const videoSearchInput = document.getElementById('video-search');
  if(videoSearchInput) videoSearchInput.addEventListener('input', (e)=>{
    state.videoSearch = e.target.value;
    render();
    const el = document.getElementById('video-search');
    if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
  });
  const videoSearchClear = document.getElementById('video-search-clear');
  if(videoSearchClear) videoSearchClear.addEventListener('click', ()=>{ state.videoSearch=''; render(); });

  const addVideoFolderBtn = document.getElementById('add-video-folder');
  if(addVideoFolderBtn) addVideoFolderBtn.addEventListener('click', ()=> promptCreateFolder('videos', ALL_ID));
  const addVideoSubfolderBtn = document.getElementById('add-video-subfolder');
  if(addVideoSubfolderBtn) addVideoSubfolderBtn.addEventListener('click', ()=> promptCreateFolder('videos', state.activeVideoFolder));
  const videoAddBtn = document.getElementById('video-add-btn');
  if(videoAddBtn) videoAddBtn.addEventListener('click', openAddVideoModal);

  // breadcrumb navigation
  document.querySelectorAll('[data-crumb]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.crumb;
      const kind = el.dataset.kind;
      if(kind === 'papers') state.activePaperFolder = id;
      else state.activeVideoFolder = id;
      render();
    });
  });

  // folder selection / deletion (papers + videos)
  document.querySelectorAll('.folder-item').forEach(item=>{
    const kind = item.dataset.kind;
    const folderId = item.dataset.folder;
    item.querySelector('[data-action="select-folder"]').addEventListener('click', ()=>{
      if(kind === 'papers') state.activePaperFolder = folderId;
      else state.activeVideoFolder = folderId;
      render();
    });
    const delBtn = item.querySelector('[data-action="delete-folder"]');
    if(delBtn) delBtn.addEventListener('click', ()=>{
      const descendantCount = getDescendantFolderIds(kind, folderId).length;
      const msg = descendantCount
        ? `這個資料夾裡還有 ${descendantCount} 個子資料夾，刪除後會一併刪除全部子資料夾與裡面的所有檔案，確定要刪除嗎？`
        : '刪除資料夾將一併刪除其中所有檔案，確定要刪除嗎？';
      confirmDialog(msg, async ()=>{
        const idsToRemove = [folderId, ...getDescendantFolderIds(kind, folderId)];
        if(kind === 'papers'){
          state.papers.folders = state.papers.folders.filter(f=>!idsToRemove.includes(f.id));
          idsToRemove.forEach(id=> delete state.papers.files[id]);
          if(idsToRemove.includes(state.activePaperFolder)){
            state.activePaperFolder = ALL_ID;
          }
          await storageSet('papers', state.papers);
        } else {
          state.videos.folders = state.videos.folders.filter(f=>!idsToRemove.includes(f.id));
          idsToRemove.forEach(id=> delete state.videos.items[id]);
          if(idsToRemove.includes(state.activeVideoFolder)){
            state.activeVideoFolder = ALL_ID;
          }
          await storageSet('videos', state.videos);
        }
        render();
        showToast('資料夾已刪除');
      });
    });
    const renameBtn = item.querySelector('[data-action="rename-folder"]');
    if(renameBtn) renameBtn.addEventListener('click', ()=> promptRenameFolder(kind, folderId));
    const moveFolderBtn = item.querySelector('[data-action="move-folder"]');
    if(moveFolderBtn) moveFolderBtn.addEventListener('click', ()=> promptMoveFolder(kind, folderId));
  });

  // folder cards (subfolders shown inside a folder) — rename / move / delete
  document.querySelectorAll('[data-action="rename-folder-card"]').forEach(btn=>{
    btn.addEventListener('click', ()=> promptRenameFolder(btn.dataset.kind, btn.dataset.folder));
  });
  document.querySelectorAll('[data-action="move-folder"][data-folder]').forEach(btn=>{
    btn.addEventListener('click', ()=> promptMoveFolder(btn.dataset.kind, btn.dataset.folder));
  });
  document.querySelectorAll('[data-action="delete-folder-card"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const kind = btn.dataset.kind;
      const folderId = btn.dataset.folder;
      const descendantCount = getDescendantFolderIds(kind, folderId).length;
      const msg = descendantCount
        ? `這個資料夾裡還有 ${descendantCount} 個子資料夾，刪除後會一併刪除全部子資料夾與裡面的所有檔案，確定要刪除嗎？`
        : '刪除資料夾將一併刪除其中所有檔案，確定要刪除嗎？';
      confirmDialog(msg, async ()=>{
        const idsToRemove = [folderId, ...getDescendantFolderIds(kind, folderId)];
        if(kind === 'papers'){
          state.papers.folders = state.papers.folders.filter(f=>!idsToRemove.includes(f.id));
          idsToRemove.forEach(id=> delete state.papers.files[id]);
          if(idsToRemove.includes(state.activePaperFolder)) state.activePaperFolder = ALL_ID;
          await storageSet('papers', state.papers);
        } else {
          state.videos.folders = state.videos.folders.filter(f=>!idsToRemove.includes(f.id));
          idsToRemove.forEach(id=> delete state.videos.items[id]);
          if(idsToRemove.includes(state.activeVideoFolder)) state.activeVideoFolder = ALL_ID;
          await storageSet('videos', state.videos);
        }
        render();
        showToast('資料夾已刪除');
      });
    });
  });

  // folder overview cards (only shown on 全部檔案 / 全部影片)
  document.querySelectorAll('[data-goto-folder]').forEach(card=>{
    card.addEventListener('click', ()=>{
      const kind = card.dataset.kind;
      const folderId = card.dataset.gotoFolder;
      if(kind === 'papers') state.activePaperFolder = folderId;
      else state.activeVideoFolder = folderId;
      render();
    });
  });

  // file download / delete (papers + videos + attendance)
  document.querySelectorAll('[data-action="download"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const kind = btn.dataset.kind;
      const id = btn.dataset.id;
      const folderId = btn.dataset.folder;
      let entry;
      if(kind === 'papers') entry = (state.papers.files[folderId]||[]).find(f=>f.id===id);
      else if(kind === 'videos') entry = (state.videos.items[folderId]||[]).find(f=>f.id===id);
      else entry = state.attendanceFiles.find(f=>f.id===id);
      if(entry) downloadFile(entry);
    });
  });
  document.querySelectorAll('[data-action="move-order-up"]').forEach(btn=>{
    btn.addEventListener('click', ()=> moveFileOrder(btn.dataset.kind, btn.dataset.folder, btn.dataset.id, -1));
  });
  document.querySelectorAll('[data-action="move-order-down"]').forEach(btn=>{
    btn.addEventListener('click', ()=> moveFileOrder(btn.dataset.kind, btn.dataset.folder, btn.dataset.id, 1));
  });
  document.querySelectorAll('[data-action="rename-file"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      promptRenameFile(btn.dataset.kind, btn.dataset.folder, btn.dataset.id);
    });
  });
  document.querySelectorAll('[data-action="move-file"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      promptMoveFile(btn.dataset.kind, btn.dataset.folder, btn.dataset.id);
    });
  });
  document.querySelectorAll('[data-action="delete-file"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const kind = btn.dataset.kind;
      const id = btn.dataset.id;
      const folderId = btn.dataset.folder;
      confirmDialog('確定要刪除這個檔案嗎？', async ()=>{
        let entry;
        if(kind === 'papers'){
          entry = (state.papers.files[folderId]||[]).find(f=>f.id===id);
          state.papers.files[folderId] = (state.papers.files[folderId]||[]).filter(f=>f.id!==id);
          await storageSet('papers', state.papers);
        } else if(kind === 'videos'){
          entry = (state.videos.items[folderId]||[]).find(f=>f.id===id);
          state.videos.items[folderId] = (state.videos.items[folderId]||[]).filter(f=>f.id!==id);
          await storageSet('videos', state.videos);
        } else {
          entry = state.attendanceFiles.find(f=>f.id===id);
          state.attendanceFiles = state.attendanceFiles.filter(f=>f.id!==id);
          await storageSet('attendance-files', state.attendanceFiles);
        }
        if(entry && entry.driveFileId) backendDeleteFile(entry.driveFileId);
        render();
        showToast('檔案已刪除');
      });
    });
  });

  // attendance file upload（依分類上傳）
  document.querySelectorAll('[data-attendance-upload-cat]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.pendingAttendanceUploadCategory = btn.dataset.attendanceUploadCat;
      const input = document.getElementById('attendance-file-input');
      if(input) input.click();
    });
  });
  const attFileInput = document.getElementById('attendance-file-input');
  if(attFileInput) attFileInput.addEventListener('change', async (e)=>{
    for(const file of Array.from(e.target.files)){
      await addFileToStore('attendance', state.pendingAttendanceUploadCategory || '點名表', file);
    }
    e.target.value = '';
    render();
  });
  const attFileSearchInput = document.getElementById('attendance-file-search');
  if(attFileSearchInput) attFileSearchInput.addEventListener('input', (e)=>{
    state.attendanceFileSearch = e.target.value;
    render();
    const el = document.getElementById('attendance-file-search');
    if(el){ el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
  });

  // settings
  const settingsBtn = document.getElementById('open-settings');
  if(settingsBtn) settingsBtn.addEventListener('click', openSettingsModal);
  const backupAttendanceBtn = document.getElementById('backup-attendance-btn');
  if(backupAttendanceBtn) backupAttendanceBtn.addEventListener('click', promptBackupAttendanceGrades);
  const backupStudentsBtn = document.getElementById('backup-students-btn');
  if(backupStudentsBtn) backupStudentsBtn.addEventListener('click', backupStudentsOnly);
  const backupInsuranceBtn = document.getElementById('backup-insurance-btn');
  if(backupInsuranceBtn) backupInsuranceBtn.addEventListener('click', ()=>{
    confirmDialog('保險名冊會包含身分證字號與生日等敏感資料，確定要備份嗎？', backupInsuranceOnly, '確定備份');
  });
  const backupSessionsBtn = document.getElementById('backup-sessions-btn');
  if(backupSessionsBtn) backupSessionsBtn.addEventListener('click', ()=>{
    confirmDialog('將依梯次分別產生名冊與保險名冊 CSV（保險名冊含身分證字號與生日），確定要備份所有梯次嗎？', backupSessionsOnly, '確定備份');
  });
  const backupAllBtn = document.getElementById('backup-all-btn');
  if(backupAllBtn) backupAllBtn.addEventListener('click', ()=>{
    confirmDialog('將產生學生名冊、保險名冊、點名總表（全部班級），以及每個梯次的名冊與保險名冊 CSV，依分類存檔。確定要執行嗎？', backupAllNow, '確定備份');
  });

  // students
  document.querySelectorAll('.sub-tab-btn[data-subview]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.attendanceSubView = btn.dataset.subview;
      render();
    });
  });
  document.querySelectorAll('[data-profile-viewmode]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.profileViewMode = btn.dataset.profileViewmode;
      render();
    });
  });

  // profile password lock
  const profilePwSubmit = document.getElementById('profile-password-submit');
  const profilePwInput = document.getElementById('profile-password-input');
  if(profilePwSubmit && profilePwInput){
    const tryUnlock = ()=>{
      if(profilePwInput.value === STUDENT_PROFILE_PASSWORD){
        state.profileUnlocked = true;
        render();
      } else {
        const err = document.getElementById('profile-password-error');
        if(err) err.classList.add('show');
        profilePwInput.value = '';
        profilePwInput.focus();
      }
    };
    profilePwSubmit.addEventListener('click', tryUnlock);
    profilePwInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') tryUnlock(); });
    profilePwInput.focus();
  }

  // 點名表檔案密碼鎖（共用同一組解鎖狀態 state.profileUnlocked）
  const filePwSubmit = document.getElementById('file-password-submit');
  const filePwInput = document.getElementById('file-password-input');
  if(filePwSubmit && filePwInput){
    const tryUnlockFile = ()=>{
      if(filePwInput.value === STUDENT_PROFILE_PASSWORD){
        state.profileUnlocked = true;
        render();
      } else {
        const err = document.getElementById('file-password-error');
        if(err) err.classList.add('show');
        filePwInput.value = '';
        filePwInput.focus();
      }
    };
    filePwSubmit.addEventListener('click', tryUnlockFile);
    filePwInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') tryUnlockFile(); });
  }

  const lockProfileBtn = document.getElementById('lock-profile-btn');
  if(lockProfileBtn) lockProfileBtn.addEventListener('click', ()=>{
    state.profileUnlocked = false;
    state.profileSelectMode = false;
    state.selectedStudentIds = [];
    render();
  });

  document.querySelectorAll('[data-open-student]').forEach(card=>{
    card.addEventListener('click', ()=>{
      const id = card.dataset.openStudent;
      if(state.profileSelectMode){
        const idx = state.selectedStudentIds.indexOf(id);
        if(idx >= 0) state.selectedStudentIds.splice(idx,1);
        else state.selectedStudentIds.push(id);
        render();
      } else {
        openStudentModal(id);
      }
    });
    card.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); card.click(); }
    });
  });
  const toggleSelectBtn = document.getElementById('toggle-select-mode-btn');
  if(toggleSelectBtn) toggleSelectBtn.addEventListener('click', ()=>{
    state.profileSelectMode = !state.profileSelectMode;
    state.selectedStudentIds = [];
    render();
  });
  const selectAllBtn = document.getElementById('select-all-students-btn');
  if(selectAllBtn) selectAllBtn.addEventListener('click', ()=>{
    const q = state.studentSearch.trim().toLowerCase();
    const visible = state.students.filter(s =>
      !q || s.zh.toLowerCase().includes(q) || (s.en||'').toLowerCase().includes(q) || (s.school||'').toLowerCase().includes(q)
    );
    state.selectedStudentIds = visible.map(s=>s.id);
    render();
  });
  const clearSelectBtn = document.getElementById('clear-select-students-btn');
  if(clearSelectBtn) clearSelectBtn.addEventListener('click', ()=>{
    state.selectedStudentIds = [];
    render();
  });
  const deleteSelectedBtn = document.getElementById('delete-selected-students-btn');
  if(deleteSelectedBtn) deleteSelectedBtn.addEventListener('click', ()=>{
    const ids = state.selectedStudentIds;
    if(!ids.length) return;
    const names = state.students.filter(s=>ids.includes(s.id)).map(s=>studentFullName(s));
    confirmDialog(
      `確定要刪除以下 ${ids.length} 位學生的資料嗎？此操作無法復原：${names.slice(0,8).join('、')}${names.length>8?' 等':''}`,
      async ()=>{
        state.students = state.students.filter(s=>!ids.includes(s.id));
        ids.forEach(id=> delete state.attendanceRecords[id]);
        await Promise.all([
          storageSet('students', state.students),
          storageSet('attendance-records', state.attendanceRecords)
        ]);
        state.selectedStudentIds = [];
        state.profileSelectMode = false;
        render();
        showToast(`已刪除 ${ids.length} 位學生的資料`);
      },
      `確定刪除這 ${ids.length} 位`
    );
  });
  const batchStatusBtn = document.getElementById('batch-status-btn');
  if(batchStatusBtn) batchStatusBtn.addEventListener('click', promptBatchStatus);
  const batchAddSubjectBtn = document.getElementById('batch-add-subject-btn');
  if(batchAddSubjectBtn) batchAddSubjectBtn.addEventListener('click', ()=> promptBatchSubjects('add'));
  const batchRemoveSubjectBtn = document.getElementById('batch-remove-subject-btn');
  if(batchRemoveSubjectBtn) batchRemoveSubjectBtn.addEventListener('click', ()=> promptBatchSubjects('remove'));
  const batchGradeBtn = document.getElementById('batch-grade-btn');
  if(batchGradeBtn) batchGradeBtn.addEventListener('click', promptBatchGrade);
  const addStudentBtn = document.getElementById('add-student-btn');
  if(addStudentBtn) addStudentBtn.addEventListener('click', ()=> openStudentModal());
  const exportRosterBtn = document.getElementById('export-roster-csv-btn');
  if(exportRosterBtn) exportRosterBtn.addEventListener('click', exportStudentRosterCsv);
  const exportInsuranceBtn = document.getElementById('export-insurance-csv-btn');
  if(exportInsuranceBtn) exportInsuranceBtn.addEventListener('click', ()=>{
    confirmDialog('保險名冊會包含身分證字號與生日等敏感資料，匯出後請妥善保管此檔案，確定要匯出嗎？', exportInsuranceRosterCsv, '確定匯出');
  });
  const importRosterBtn = document.getElementById('import-roster-csv-btn');
  const importRosterInput = document.getElementById('import-roster-csv-input');
  if(importRosterBtn) importRosterBtn.addEventListener('click', ()=> importRosterInput.click());
  if(importRosterInput) importRosterInput.addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(file) await importStudentRosterCsv(file);
    e.target.value = '';
  });
  const searchInput = document.getElementById('student-search');
  if(searchInput) searchInput.addEventListener('input', (e)=>{
    state.studentSearch = e.target.value;
    render();
    document.getElementById('student-search').focus();
    const val = document.getElementById('student-search');
    val.selectionStart = val.selectionEnd = val.value.length;
  });
  const statusFilterSelect = document.getElementById('profile-status-filter');
  if(statusFilterSelect) statusFilterSelect.addEventListener('change', (e)=>{
    state.profileStatusFilter = e.target.value;
    render();
  });
  const subjectFilterSelect = document.getElementById('profile-subject-filter');
  if(subjectFilterSelect) subjectFilterSelect.addEventListener('change', (e)=>{
    state.profileSubjectFilter = e.target.value;
    render();
  });
  document.querySelectorAll('[data-action="delete-student"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      confirmDialog('確定要刪除這位學生的資料嗎？', async ()=>{
        state.students = state.students.filter(s=>s.id!==id);
        delete state.attendanceRecords[id];
        await Promise.all([
          storageSet('students', state.students),
          storageSet('attendance-records', state.attendanceRecords)
        ]);
        render();
        showToast('學生資料已刪除');
      });
    });
  });

  // attendance date columns + grid cells
  const addDateBtn = document.getElementById('add-date-btn');
  if(addDateBtn) addDateBtn.addEventListener('click', promptAddDateColumn);
  document.querySelectorAll('.date-del[data-date]').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteDateColumn(btn.dataset.date));
  });
  document.querySelectorAll('.att-cell[data-date]').forEach(input=>{
    input.addEventListener('change', (e)=>{
      setAttendanceCell(input.dataset.student, input.dataset.date, e.target.value);
    });
  });
  document.querySelectorAll('.note-cell[data-student]').forEach(input=>{
    input.addEventListener('change', (e)=>{
      setStudentNote(input.dataset.student, e.target.value);
    });
  });

  // 梯次名冊
  const addSessionBtn = document.getElementById('add-session-btn');
  if(addSessionBtn) addSessionBtn.addEventListener('click', promptCreateSession);
  document.querySelectorAll('[data-open-session]').forEach(card=>{
    card.addEventListener('click', ()=>{
      state.activeSessionId = card.dataset.openSession;
      render();
    });
  });
  const backToSessionsBtn = document.getElementById('back-to-sessions-btn');
  if(backToSessionsBtn) backToSessionsBtn.addEventListener('click', ()=>{ state.activeSessionId = null; render(); });
  const editSessionBtn = document.getElementById('edit-session-btn');
  if(editSessionBtn) editSessionBtn.addEventListener('click', ()=> promptEditSessionInfo(state.activeSessionId));
  const manageSessionStudentsBtn = document.getElementById('manage-session-students-btn');
  if(manageSessionStudentsBtn) manageSessionStudentsBtn.addEventListener('click', ()=> openSessionStudentPicker(state.activeSessionId));
  const addSessionDateBtn = document.getElementById('add-session-date-btn');
  if(addSessionDateBtn) addSessionDateBtn.addEventListener('click', ()=> promptAddSessionDateColumn(state.activeSessionId));
  const exportSessionCsvBtn = document.getElementById('export-session-csv-btn');
  if(exportSessionCsvBtn) exportSessionCsvBtn.addEventListener('click', ()=> exportSessionRosterCsv(state.activeSessionId));
  const exportSessionInsuranceCsvBtn = document.getElementById('export-session-insurance-csv-btn');
  if(exportSessionInsuranceCsvBtn) exportSessionInsuranceCsvBtn.addEventListener('click', ()=>{
    confirmDialog('保險名冊會包含身分證字號與生日等敏感資料，匯出後請妥善保管此檔案，確定要匯出嗎？', ()=> exportSessionInsuranceCsv(state.activeSessionId), '確定匯出');
  });
  const backupSessionBtn = document.getElementById('backup-session-btn');
  if(backupSessionBtn) backupSessionBtn.addEventListener('click', ()=> backupSingleSession(state.activeSessionId));
  const deleteSessionBtn = document.getElementById('delete-session-btn');
  if(deleteSessionBtn) deleteSessionBtn.addEventListener('click', ()=> deleteSession(state.activeSessionId));
  const sessionPaymentFilterSelect = document.getElementById('session-payment-filter');
  if(sessionPaymentFilterSelect) sessionPaymentFilterSelect.addEventListener('change', (e)=>{
    state.sessionPaymentFilter = e.target.value;
    render();
  });
  document.querySelectorAll('[data-payment-quickfilter]').forEach(card=>{
    card.addEventListener('click', ()=>{
      const val = card.dataset.paymentQuickfilter;
      state.sessionPaymentFilter = (state.sessionPaymentFilter === val) ? '全部' : val;
      render();
    });
  });
  document.querySelectorAll('.date-del[data-session-date]').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteSessionDateColumn(state.activeSessionId, btn.dataset.sessionDate));
  });
  document.querySelectorAll('[data-action="remove-session-student"]').forEach(btn=>{
    btn.addEventListener('click', ()=> removeStudentFromSession(state.activeSessionId, btn.dataset.id));
  });
  document.querySelectorAll('.session-payment-select').forEach(sel=>{
    sel.addEventListener('change', (e)=>{
      setSessionPayment(state.activeSessionId, sel.dataset.sessionStudent, e.target.value);
    });
  });
  document.querySelectorAll('.att-cell[data-session-date]').forEach(input=>{
    input.addEventListener('change', (e)=>{
      setSessionAttendanceCell(state.activeSessionId, input.dataset.sessionStudentCell, input.dataset.sessionDate, e.target.value);
    });
  });

  // csv export / import
  const exportCsvBtn = document.getElementById('export-csv-btn');
  if(exportCsvBtn) exportCsvBtn.addEventListener('click', exportAttendanceCsv);
  const importCsvBtn = document.getElementById('import-csv-btn');
  const importCsvInput = document.getElementById('import-csv-input');
  if(importCsvBtn) importCsvBtn.addEventListener('click', ()=> importCsvInput.click());
  if(importCsvInput) importCsvInput.addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(file) await importAttendanceCsv(file);
    e.target.value = '';
  });
}
