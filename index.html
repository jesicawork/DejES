<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>大洋周文理補習班｜高中資料庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender-bg:#EEE7F8;
    --lavender-deep:#9B7FC7;
    --lavender-line:#D9CBEF;
    --yellow-bg:#FFF7DC;
    --yellow-deep:#F0C94A;
    --ink:#453659;
    --ink-soft:#7A6C93;
    --paper:#FFFFFF;
    --danger:#D9695F;
    --shadow: 0 8px 24px rgba(90,66,130,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans TC",sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(240,201,74,0.18), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(155,127,199,0.16), transparent 45%),
      var(--lavender-bg);
    color:var(--ink);
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:"Noto Serif TC",serif;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--yellow-deep);color:var(--ink);}

  .app{
    display:flex;
    min-height:100vh;
    max-width:1280px;
    margin:0 auto;
  }

  /* ---------- Folder-tab side nav ---------- */
  .tabnav{
    width:112px;
    flex-shrink:0;
    padding:38px 0 20px 18px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .tabnav .brandmark{
    writing-mode:vertical-rl;
    font-family:"Noto Serif TC",serif;
    font-weight:900;
    font-size:13px;
    letter-spacing:4px;
    color:var(--lavender-deep);
    margin-bottom:10px;
    padding-left:4px;
  }
  .tab-btn{
    position:relative;
    border:none;
    text-align:left;
    padding:16px 10px 16px 16px;
    border-radius:14px 4px 4px 14px;
    font-size:14px;
    font-weight:700;
    color:var(--ink-soft);
    background:rgba(255,255,255,0.55);
    box-shadow:0 2px 6px rgba(90,66,130,0.08);
    transform:translateX(0) rotate(-0.4deg);
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    line-height:1.5;
  }
  .tab-btn .en{
    display:block;
    font-size:9px;
    letter-spacing:1.5px;
    font-weight:500;
    color:var(--ink-soft);
    opacity:.7;
    margin-top:2px;
  }
  .tab-btn:nth-child(2){ background:var(--yellow-bg); }
  .tab-btn:nth-child(3){ background:var(--lavender-bg); }
  .tab-btn:nth-child(4){ background:var(--yellow-bg); }
  .tab-btn:nth-child(5){ background:var(--lavender-bg); }
  .tab-btn:hover{ transform:translateX(6px) rotate(-0.4deg); }
  .tab-btn.active{
    background:var(--paper);
    color:var(--ink);
    transform:translateX(14px) rotate(0deg);
    box-shadow:var(--shadow);
    z-index:2;
  }
  .tab-btn.active::after{
    content:"";
    position:absolute;
    right:-14px; top:0; bottom:0; width:14px;
    background:var(--paper);
  }

  /* ---------- Main paper card ---------- */
  .main-wrap{
    flex:1;
    padding:32px 32px 32px 0;
    min-width:0;
  }
  .paper-card{
    position:relative;
    background:var(--paper);
    border-radius:6px 22px 22px 22px;
    box-shadow:var(--shadow);
    min-height:calc(100vh - 64px);
    padding:36px 40px;
    overflow:hidden;
  }
  .paper-card::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0; width:26px;
    background-image: radial-gradient(circle, var(--lavender-bg) 5px, transparent 5.5px);
    background-size: 26px 34px;
    background-position: 9px 20px;
    opacity:.9;
  }
  .paper-card > .content{
    margin-left:14px;
    animation: fadein .35s ease;
  }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){
    .paper-card > .content{ animation:none; }
    .tab-btn{ transition:none; }
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:22px;
    gap:16px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:3px;
    color:var(--lavender-deep);
    font-weight:700;
    margin:0 0 6px;
  }
  .page-title{
    font-size:28px;
    margin:0;
    color:var(--ink);
    font-weight:900;
  }
  .icon-btn{
    border:1px solid var(--lavender-line);
    background:var(--lavender-bg);
    color:var(--ink);
    width:38px;height:38px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex-shrink:0;
  }
  .icon-btn:hover{ background:var(--yellow-bg); }

  /* ---------- Home ---------- */
  .hero{
    background:linear-gradient(135deg, var(--yellow-bg), var(--paper) 60%);
    border:1px solid var(--yellow-deep);
    border-radius:20px;
    padding:34px 36px;
    margin-bottom:26px;
  }
  .hero h1{ font-size:34px; margin:0 0 6px; color:var(--ink); }
  .hero p{ margin:0; color:var(--ink-soft); font-size:15px; }
  .stat-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
    margin:26px 0;
  }
  .stat-card{
    background:var(--paper);
    border:1px solid var(--lavender-line);
    border-radius:16px;
    padding:18px 20px;
    position:relative;
  }
  .stat-card::before{
    content:"";
    position:absolute; top:-6px; left:20px;
    width:34px; height:12px;
    background:var(--yellow-deep);
    opacity:.6;
    border-radius:2px;
    transform:rotate(-3deg);
  }
  .stat-num{ font-family:"Noto Serif TC",serif; font-size:30px; font-weight:900; color:var(--lavender-deep); }
  .stat-label{ font-size:13px; color:var(--ink-soft); margin-top:2px; }

  .nav-cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .nav-card{
    border:1px solid var(--lavender-line);
    border-radius:16px;
    padding:22px 20px;
    background:var(--lavender-bg);
    transition:transform .15s ease, box-shadow .15s ease;
    text-align:left;
  }
  .nav-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow); }
  .nav-card h3{ margin:8px 0 4px; font-size:17px; }
  .nav-card p{ margin:0; font-size:13px; color:var(--ink-soft); line-height:1.6; }
  .nav-card .badge{
    display:inline-block; font-size:22px;
  }

  /* ---------- Layout: sidebar + list ---------- */
  .two-col{ display:flex; gap:24px; align-items:flex-start; }
  .folder-side{
    width:220px;
    flex-shrink:0;
    background:var(--lavender-bg);
    border-radius:16px;
    padding:16px;
  }
  .folder-side h4{ margin:0 0 10px; font-size:13px; letter-spacing:1px; color:var(--ink-soft); font-weight:700; }
  .folder-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 10px;
    border-radius:10px;
    font-size:14px;
    color:var(--ink);
    margin-bottom:4px;
  }
  .folder-item:hover{ background:rgba(255,255,255,.6); }
  .folder-item.active{ background:var(--paper); font-weight:700; box-shadow:0 2px 6px rgba(90,66,130,.1); }
  .folder-item .name{ flex:1; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .folder-item .del{ opacity:0; border:none; background:none; color:var(--danger); font-size:13px; padding:2px 4px; }
  .folder-item:hover .del{ opacity:.8; }
  .add-folder-btn{
    width:100%; margin-top:8px;
    border:1.5px dashed var(--lavender-deep);
    background:transparent;
    color:var(--lavender-deep);
    border-radius:10px;
    padding:8px;
    font-size:13px;
    font-weight:600;
  }
  .add-folder-btn:hover{ background:rgba(155,127,199,0.1); }
  .folder-item.pinned{
    font-weight:700; margin-bottom:10px; padding-bottom:9px;
    border-bottom:1.5px dashed var(--lavender-line);
    border-radius:10px 10px 0 0;
  }
  .folder-item.pinned.active{ box-shadow:none; background:rgba(255,255,255,.75); }

  .breadcrumb{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:12px; font-size:13px; }
  .breadcrumb .crumb{ cursor:pointer; color:var(--ink-soft); padding:3px 8px; border-radius:8px; }
  .breadcrumb .crumb:hover{ background:var(--lavender-bg); color:var(--ink); }
  .breadcrumb .crumb.current{ color:var(--lavender-deep); font-weight:700; cursor:default; }
  .breadcrumb .crumb.current:hover{ background:none; }
  .breadcrumb .crumb-sep{ color:var(--ink-soft); opacity:.6; }

  .folder-overview{ margin-top:22px; }
  .folder-overview h4{ margin:0 0 10px; font-size:13px; letter-spacing:1px; color:var(--ink-soft); font-weight:700; }
  .folder-card-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
  .folder-card{
    display:flex; flex-direction:column; gap:0;
    background:var(--paper); border:1.5px solid var(--lavender-line); border-radius:12px;
    overflow:hidden; transition:transform .15s ease, box-shadow .15s ease;
  }
  .folder-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--lavender-deep); }
  .folder-card-nav{
    display:flex; flex-direction:column; align-items:flex-start; gap:4px;
    padding:14px 14px 10px; text-align:left; background:none; width:100%;
  }
  .folder-card .ic{ font-size:20px; }
  .folder-card .name{ font-weight:700; font-size:14px; }
  .folder-card .count{ font-size:11px; color:var(--ink-soft); }
  .folder-card-actions{
    display:flex; justify-content:flex-end; gap:4px; padding:6px 10px;
    border-top:1px solid var(--lavender-line); background:rgba(155,127,199,0.05);
  }
  .folder-card-actions .del{ border:none; background:none; color:var(--ink-soft); font-size:13px; padding:2px 5px; }
  .folder-card-actions .del:hover{ color:var(--danger); }

  .folder-chip{
    display:inline-block; font-size:10px; font-weight:700; color:var(--lavender-deep);
    background:var(--lavender-bg); padding:2px 8px; border-radius:99px; margin-left:6px; vertical-align:middle;
  }

  .file-panel{ flex:1; min-width:0; }
  .file-panel-head{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px;
  }
  .file-panel-head h3{ margin:0; font-size:16px; }
  .btn{
    border:none; border-radius:10px; padding:9px 16px;
    font-size:13px; font-weight:700;
    background:var(--lavender-deep); color:#fff;
  }
  .btn:hover{ opacity:.9; }
  .btn.secondary{ background:var(--yellow-deep); color:var(--ink); }
  .btn.ghost{ background:var(--lavender-bg); color:var(--ink); }
  .btn.small{ padding:6px 12px; font-size:12px; }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  .file-row{
    display:flex; align-items:center; gap:14px;
    padding:12px 14px;
    border:1px solid var(--lavender-line);
    border-radius:12px;
    margin-bottom:10px;
    background:var(--paper);
  }
  .file-row .ic{ font-size:20px; width:28px; text-align:center; flex-shrink:0; }
  .file-row .meta{ flex:1; min-width:0; }
  .file-row .fname{ font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .file-row .fsub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .file-row .actions{ display:flex; gap:6px; flex-shrink:0; }

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty-state .ic{ font-size:38px; display:block; margin-bottom:10px; }

  /* ---------- Attendance / student table ---------- */
  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .toolbar input[type=text]{
    flex:1; min-width:160px;
    padding:9px 12px; border-radius:10px; border:1px solid var(--lavender-line);
    font-size:13px; background:var(--lavender-bg);
  }
  table.student-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.student-table th{
    text-align:left; padding:10px 12px; color:var(--ink-soft);
    border-bottom:2px solid var(--lavender-line); font-weight:700; white-space:nowrap;
  }
  table.student-table td{ padding:10px 12px; border-bottom:1px solid var(--lavender-line); }
  table.student-table tr:hover td{ background:var(--lavender-bg); }
  .pill{ display:inline-block; padding:2px 10px; border-radius:99px; font-size:11px; font-weight:700; }
  .pill.track-高中{ background:#E4DBFA; color:var(--lavender-deep); }
  .pill.track-高職{ background:var(--yellow-bg); color:#9A7C1B; }
  .pill.track-五專{ background:#DCEFE2; color:#3D8461; }

  /* ---------- Roster grid (attendance) ---------- */
  table.roster-grid{ table-layout:auto; }
  table.roster-grid th.date-col{ position:relative; padding-right:26px; }
  table.roster-grid th.date-col .date-del{
    position:absolute; right:4px; top:50%; transform:translateY(-50%);
    border:none; background:transparent; color:var(--ink-soft); font-size:11px;
    width:18px; height:18px; border-radius:50%; padding:0; line-height:18px;
  }
  table.roster-grid th.date-col .date-del:hover{ background:var(--danger); color:#fff; }
  table.roster-grid tr.grade-row td{
    background:linear-gradient(90deg, var(--lavender-deep), var(--yellow-deep));
    color:#fff; font-weight:900; font-family:"Noto Serif TC",serif; letter-spacing:2px;
    padding:8px 14px; border-bottom:none;
  }
  table.roster-grid tr.grade-row:first-child td{ border-radius:10px 10px 0 0; }
  .sub-meta{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .att-cell, .note-cell{
    width:64px; border:1px solid var(--lavender-line); border-radius:8px;
    padding:6px 8px; font-size:12px; font-family:inherit; background:var(--paper);
    color:var(--ink); text-align:center;
  }
  .note-cell{ width:130px; text-align:left; }
  .att-cell:focus, .note-cell:focus{ outline:none; border-color:var(--lavender-deep); box-shadow:0 0 0 3px rgba(155,127,199,0.2); }

  /* ---------- Sub tabs (student profile / attendance grid) ---------- */
  .sub-tabs{ display:flex; gap:8px; margin-top:24px; border-bottom:2px solid var(--lavender-line); }
  .sub-tab-btn{
    border:none; background:transparent; padding:10px 16px; font-size:14px; font-weight:700;
    color:var(--ink-soft); border-radius:10px 10px 0 0; position:relative; top:2px;
  }
  .sub-tab-btn.active{ background:var(--paper); color:var(--lavender-deep); box-shadow:0 -2px 8px rgba(90,66,130,0.06); }
  .sub-tab-btn:hover{ color:var(--ink); }

  /* ---------- Student profile cards ---------- */
  .profile-grade-block{ margin-top:20px; }
  .profile-grade-label{
    display:inline-block; font-family:"Noto Serif TC",serif; font-weight:900; font-size:14px;
    letter-spacing:2px; color:#fff; background:linear-gradient(90deg, var(--lavender-deep), var(--yellow-deep));
    padding:6px 16px; border-radius:8px; margin-bottom:10px;
  }
  .profile-card-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:12px; }
  .profile-card{
    text-align:left; background:var(--paper); border:1.5px solid var(--lavender-line); border-radius:14px;
    padding:14px 16px; display:flex; flex-direction:column; gap:5px; transition:transform .15s ease, box-shadow .15s ease;
    cursor:pointer;
  }
  .profile-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--lavender-deep); }
  .profile-card .pc-name{ font-weight:700; font-size:15px; }
  .profile-card .pc-top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .status-badge{
    flex-shrink:0; font-size:10px; font-weight:800; padding:2px 9px; border-radius:99px;
    white-space:nowrap;
  }
  .status-badge.status-active{ background:#DCEFE2; color:#3D8461; }
  .status-badge.status-new{ background:var(--yellow-bg); color:#9A7C1B; }
  .status-badge.status-transfer{ background:#E4DBFA; color:var(--lavender-deep); }
  .status-badge.status-left{ background:#F3E4E2; color:var(--danger); }
  .profile-card .pc-meta{ font-size:12px; color:var(--ink-soft); }
  .profile-card .pc-phone{ font-size:12px; color:var(--ink); }
  .profile-card .pc-note{ font-size:11px; color:#9A7C1B; background:var(--yellow-bg); padding:3px 8px; border-radius:6px; margin-top:2px; }

  .select-toolbar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    background:var(--lavender-bg); border-radius:12px; padding:10px 14px; margin-top:14px;
    font-size:13px; font-weight:600; color:var(--ink);
  }
  .profile-card.selectable{ cursor:pointer; padding-top:30px; position:relative; }
  .profile-card .pc-check{ position:absolute; top:10px; right:12px; font-size:16px; }
  .profile-card.selected{ border-color:var(--lavender-deep); background:#F4EFFC; box-shadow:0 0 0 2px rgba(155,127,199,0.25); }

  /* ---------- Profile lock screen ---------- */
  .lock-screen{ display:flex; justify-content:center; padding:40px 14px; }
  .lock-card{
    width:100%; max-width:320px; text-align:center; background:var(--paper);
    border:1.5px solid var(--lavender-line); border-radius:18px; padding:32px 24px;
    box-shadow:var(--shadow);
  }
  .lock-icon{ font-size:34px; margin-bottom:8px; }
  .lock-card h3{ margin:0 0 6px; font-size:17px; }
  .lock-card .sub{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }
  .lock-card input[type=password]{
    width:100%; padding:11px 14px; border-radius:10px; border:1.5px solid var(--lavender-line);
    font-size:16px; text-align:center; letter-spacing:3px; background:var(--lavender-bg); color:var(--ink);
  }
  .lock-error{ color:var(--danger); font-size:12px; margin-top:8px; height:16px; visibility:hidden; }
  .lock-error.show{ visibility:visible; }

  .status-history{ max-height:120px; overflow-y:auto; border:1px solid var(--lavender-line); border-radius:10px; padding:8px 10px; background:var(--lavender-bg); }
  .status-history-row{ display:flex; justify-content:space-between; align-items:center; font-size:12px; padding:4px 0; border-bottom:1px dashed var(--lavender-line); }
  .status-history-row:last-child{ border-bottom:none; }
  .batch-field{ border:1px solid var(--lavender-line); border-radius:10px; padding:10px 12px; margin-bottom:10px; }
  .batch-field label{ font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .batch-field select:disabled, .batch-field input:disabled{ opacity:.45; }
  .settings-section{ border-top:1.5px dashed var(--lavender-line); margin-top:16px; padding-top:14px; }
  .settings-section h4{ margin:0 0 6px; font-size:14px; }

  .help-section{
    background:var(--paper); border:1.5px solid var(--lavender-line); border-radius:14px;
    padding:18px 20px; margin-bottom:16px;
  }
  .help-section h3{ margin:0 0 10px; font-size:15px; color:var(--lavender-deep); font-family:"Noto Serif TC",serif; }
  .help-section ul{ margin:0; padding-left:20px; display:flex; flex-direction:column; gap:8px; }
  .help-section li{ font-size:13.5px; line-height:1.6; color:var(--ink); }
  .help-section li b{ color:var(--lavender-deep); }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(69,54,89,0.35);
    display:flex; align-items:center; justify-content:center; z-index:50;
    padding:20px;
  }
  .modal{
    background:var(--paper); border-radius:18px; padding:26px 28px;
    width:100%; max-width:460px; box-shadow:var(--shadow);
    max-height:88vh; overflow-y:auto;
  }
  .modal h3{ margin:0 0 4px; font-size:18px; }
  .modal .sub{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:5px; }
  .field input[type=text], .field input[type=tel], .field select, .field input[type=url], .field input[type=date]{
    width:100%; padding:9px 12px; border-radius:10px; border:1px solid var(--lavender-line);
    font-size:14px; background:var(--lavender-bg); color:var(--ink);
  }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
  .radio-group{ display:flex; gap:16px; margin-bottom:14px; }
  .radio-group label{ font-size:13px; display:flex; align-items:center; gap:5px; font-weight:600; }

  /* ---------- Toast ---------- */
  #toast-wrap{ position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:99; }
  .toast{
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:10px;
    font-size:13px; box-shadow:var(--shadow); animation:toastin .25s ease;
    max-width:320px;
  }
  .toast.warn{ background:#B4562C; }

<script>
/* ============ backend: local (this browser) or cloud (Google Apps Script) ============ */
const LOCAL_PREFIX = 'dyzw_';
const GAS_URL_KEY = 'dyzw_gas_url';

/**
 * 把您部署好的 Apps Script 網址（結尾 /exec）填在下面雙引號中間，
 * 例如：const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycb.../exec';
 * 填好、存檔、上傳到 GitHub 後，任何人打開這個網站都會自動連到
 * 同一個共用後台，完全不用再手動設定「⚙️ 同步設定」這一步。
 * 留空 '' 則預設為每台裝置各自的本機模式，仍可在網頁裡手動設定。
 */
const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbyAvOsJzamjnyIs1_FlytDiUkm5TaG4rpb_7BXBUSXOsgUbxxyiV3ycPzKEuxU3pVaJiA/exec';
const Backend = {
  gasUrl: '',
  cache: null, // 雲端模式下，開頁時一次讀回來的完整資料
  cloudReady: false
};

async function initBackend(){
  Backend.gasUrl = localStorage.getItem(GAS_URL_KEY) || DEFAULT_GAS_URL;
  if(!Backend.gasUrl){
    Backend.cloudReady = false;
    return;
  }
  try{
    const res = await fetch(Backend.gasUrl + '?action=getAll');
    const json = await res.json();
    if(json && json.ok){
      Backend.cache = json.data || {};
      Backend.cloudReady = true;
    } else {
      throw new Error(json && json.error || '後端回應異常');
    }
  }catch(e){
    Backend.cloudReady = false;
    Backend.cache = {};
    showToast('連線 Google 後端失敗，暫時改用本機資料（不影響操作，但不會跨裝置同步）', 'warn');
  }
}

async function storageGet(key, fallback){
  if(Backend.gasUrl && Backend.cloudReady){
    return Object.prototype.hasOwnProperty.call(Backend.cache, key) ? Backend.cache[key] : fallback;
  }
  try{
    const raw = localStorage.getItem(LOCAL_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}

async function storageSet(key, value){
  if(Backend.gasUrl && Backend.cloudReady){
    Backend.cache[key] = value;
    try{
      await fetch(Backend.gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action:'set', key, value })
      });
      return true;
    }catch(e){
      showToast('同步到雲端失敗，請檢查網路連線','warn');
      return false;
    }
  }
  try{
    localStorage.setItem(LOCAL_PREFIX + key, JSON.stringify(value));
    return true;
  }catch(e){
    showToast('本機儲存空間已滿，建議清理部分資料或改用雲端同步','warn');
    return false;
  }
}

/**
 * 上傳檔案內容：雲端模式存進 Google 雲端硬碟（回傳 driveFileId）；
 * 本機模式回傳 null，檔案內容改為直接內嵌存在本機資料裡。
 */
async function backendUploadFile(kind, folderName, fileName, dataUrl){
  if(!(Backend.gasUrl && Backend.cloudReady)) return null;
  const res = await fetch(Backend.gasUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action:'uploadFile', kind, folderName, fileName, dataUrl })
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || '上傳失敗');
  return json.result; // { fileId, name, size }
}

async function backendDownloadFile(driveFileId){
  const res = await fetch(Backend.gasUrl + '?action=getFile&id=' + encodeURIComponent(driveFileId));
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || '下載失敗');
  return json.file; // { name, mimeType, dataUrl }
}

async function backendDeleteFile(driveFileId){
  if(!(Backend.gasUrl && Backend.cloudReady) || !driveFileId) return;
  try{
    await fetch(Backend.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action:'deleteFile', fileId: driveFileId })
    });
  }catch(e){ /* 忽略刪除雲端檔案失敗，不影響網頁本身操作 */ }
}

  paperSearch: '',
  videoSearch: '',

  selectedStudentIds: [],

  profileStatusFilter: '全部',
  yearSnapshots: [],

const GRADE_ORDER = ['高一','高二','高三','專一','專二','專三','專四','專五'];

function generateStudentNo(){
  const year = new Date().getFullYear();
  const prefix = 'H' + year;
  const countThisYear = state.students.filter(s => s.studentNo && s.studentNo.startsWith(prefix)).length;
  return `${prefix}${String(countThisYear + 1).padStart(3,'0')}`;
}
function enrollStatusClass(status){
  if(status === '在班') return 'status-active';
  if(status === '新生') return 'status-new';
  if(status === '轉出') return 'status-transfer';
  if(status === '退班') return 'status-left';
  return 'status-active';
}
function todayLabel(){
  const d = new Date();
  const week = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}/${d.getDate()}（${week[d.getDay()]}）`;
}
function studentFullName(s){ return s.en ? `${s.zh} ${s.en}` : s.zh; }
function findDuplicateStudent(candidate, excludeId){
  const phone = (candidate.phone||'').trim();
  const zh = (candidate.zh||'').trim();
  const birthday = (candidate.birthday||'').trim();
  return state.students.find(s=>{
    if(excludeId && s.id === excludeId) return false;
    const phoneMatch = phone && (s.phone||'').trim() === phone;
    const nameBirthdayMatch = zh && birthday && (s.zh||'').trim() === zh && (s.birthday||'').trim() === birthday;
    return phoneMatch || nameBirthdayMatch;
  });
}

function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtSize(bytes){
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}
function fmtDate(iso){
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg, type){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'warn' ? ' warn' : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3600);
}

/* ============ load ============ */
async function loadAll(){
  await initBackend();
  const [papers, videos, attendanceFiles, students, attendanceDates, attendanceRecords, yearSnapshots] = await Promise.all([
    storageGet('papers', { folders: [], files: {} }),
    storageGet('videos', { folders: [], items: {} }),
    storageGet('attendance-files', []),
    storageGet('students', []),
    storageGet('attendance-dates', []),
    storageGet('attendance-records', {}),
    storageGet('year-snapshots', [])
  ]);
  state.papers = papers;
  state.videos = videos;
  if(!state.papers.files[ALL_ID]) state.papers.files[ALL_ID] = [];
  if(!state.videos.items[ALL_ID]) state.videos.items[ALL_ID] = [];
  state.attendanceFiles = attendanceFiles;
  state.students = students;
  state.attendanceDates = attendanceDates;
  state.attendanceRecords = attendanceRecords;
  state.yearSnapshots = yearSnapshots;
  state.settings = { gasUrl: Backend.gasUrl, cloudReady: Backend.cloudReady };
  if(!state.activePaperFolder) state.activePaperFolder = ALL_ID;
  if(!state.activeVideoFolder) state.activeVideoFolder = ALL_ID;
  state.loaded = true;
}

/* ============ modal helpers ============ */
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }
function openModal(html){
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal">${html}</div></div>`;
  document.getElementById('modal-overlay').addEventListener('click', (e)=>{
    if(e.target.id === 'modal-overlay') closeModal();
  });
}
function confirmDialog(message, onYes, confirmLabel){
  openModal(`
    <h3>確認操作</h3>
    <p class="sub" style="font-size:14px;color:var(--ink);margin-top:10px;">${escapeHtml(message)}</p>
    <div class="modal-actions">
      <button class="btn ghost" id="cd-cancel">取消</button>
      <button class="btn" id="cd-yes" style="background:var(--danger);">${escapeHtml(confirmLabel || '確定刪除')}</button>
    </div>
  `);
  document.getElementById('cd-cancel').onclick = closeModal;
  document.getElementById('cd-yes').onclick = ()=>{ closeModal(); onYes(); };
}

/* ============ nav ============ */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(state.view === 'attendance' && btn.dataset.view !== 'attendance'){
      state.profileUnlocked = false; // 離開學生檔案及點名表分頁時自動重新鎖定
    }
    state.view = btn.dataset.view;
    render();
  });
});

/* ============ render root ============ */
function render(){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.view === state.view);
  });
  const c = document.getElementById('content');
  if(!state.loaded){
    c.innerHTML = `<div class="empty-state"><span class="ic">⏳</span>資料載入中…</div>`;
    return;
  }
  if(state.view === 'home') c.innerHTML = renderHome();
  else if(state.view === 'papers') c.innerHTML = renderPapers();
  else if(state.view === 'videos') c.innerHTML = renderVideos();
  else if(state.view === 'attendance') c.innerHTML = renderAttendance();
  else if(state.view === 'help') c.innerHTML = renderHelp();
  bindViewEvents();
}

/* ============ PAPERS ============ */
function getChildFolders(kind, parentId){
  const data = kind === 'papers' ? state.papers : state.videos;
  return data.folders.filter(f => (f.parentId || ALL_ID) === parentId);
}

function getFolderPath(kind, folderId){
  if(folderId === ALL_ID) return [];
  const data = kind === 'papers' ? state.papers : state.videos;
  const path = [];
  let current = data.folders.find(f=>f.id===folderId);
  const guard = new Set();
  while(current && !guard.has(current.id)){
    path.unshift(current);
    guard.add(current.id);
    const parentId = current.parentId || ALL_ID;
    if(parentId === ALL_ID) break;
    current = data.folders.find(f=>f.id===parentId);
  }
  return path;
}

function getDescendantFolderIds(kind, folderId){
  const ids = [];
  const walk = (pid)=>{
    getChildFolders(kind, pid).forEach(child=>{
      ids.push(child.id);
      walk(child.id);
    });
  };
  walk(folderId);
  return ids;
}

function renderFolderList(kind){
  const data = kind === 'papers' ? state.papers : state.videos;
  const activeId = kind === 'papers' ? state.activePaperFolder : state.activeVideoFolder;
  const allLabel = kind === 'papers' ? '全部試卷' : '全部影片';
  const pinned = `
    <div class="folder-item pinned ${activeId === ALL_ID ? 'active' : ''}" data-folder="${ALL_ID}" data-kind="${kind}">
      <span class="name" data-action="select-folder">🗂️ ${allLabel}</span>
    </div>
  `;
  const topLevel = getChildFolders(kind, ALL_ID);
  if(!topLevel.length){
    return pinned + `<p style="font-size:12px;color:var(--ink-soft);margin:6px 0 10px;">尚無自訂資料夾</p>`;
  }
  return pinned + topLevel.map(f => `
    <div class="folder-item ${f.id === activeId ? 'active' : ''}" data-folder="${f.id}" data-kind="${kind}">
      <span class="name" data-action="select-folder">📁 ${escapeHtml(f.name)}</span>
      <button class="del" data-action="rename-folder" title="修改資料夾名稱">✏️</button>
      <button class="del" data-action="move-folder" title="移動資料夾">📂</button>
      <button class="del" data-action="delete-folder" title="刪除資料夾">✕</button>
    </div>
  `).join('');
}

function searchFiles(kind, query){
  const q = query.trim().toLowerCase();
  if(!q) return null;
  const data = kind === 'papers' ? state.papers : state.videos;
  const bucket = kind === 'papers' ? data.files : data.items;
  const results = [];
  Object.keys(bucket).forEach(fid=>{
    const folderName = fid === ALL_ID
      ? (kind === 'papers' ? '全部試卷（未分類）' : '全部影片（未分類）')
      : (data.folders.find(f=>f.id===fid)?.name || '（資料夾已刪除）');
    (bucket[fid]||[]).forEach(f=>{
      if(f.name.toLowerCase().includes(q)){
        results.push(Object.assign({}, f, { _folderId: fid, _folderName: folderName }));
      }
    });
  });
  return results;
}

function renderFolderOverview(kind, parentId){
  const bucket = kind === 'papers' ? state.papers.files : state.videos.items;
  const children = getChildFolders(kind, parentId);
  if(!children.length) return '';
  return `
    <div class="folder-overview">
      <h4>子資料夾</h4>
      <div class="folder-card-grid">
        ${children.map(f => {
          const childCount = getChildFolders(kind, f.id).length;
          return `
          <div class="folder-card">
            <button class="folder-card-nav" data-goto-folder="${f.id}" data-kind="${kind}">
              <span class="ic">📁</span>
              <span class="name">${escapeHtml(f.name)}</span>
              <span class="count">${(bucket[f.id]||[]).length} 份${childCount ? '・' + childCount + ' 個子資料夾' : ''}</span>
            </button>
            <div class="folder-card-actions">
              <button class="del" data-action="rename-folder-card" data-folder="${f.id}" data-kind="${kind}" title="修改名稱">✏️</button>
              <button class="del" data-action="move-folder" data-folder="${f.id}" data-kind="${kind}" title="移動資料夾">📂</button>
              <button class="del" data-action="delete-folder-card" data-folder="${f.id}" data-kind="${kind}" title="刪除">✕</button>
            </div>
          </div>
        `;
        }).join('')}
      </div>
    </div>
  `;
}

function renderFileRows(files, kind, defaultFolderId){
  if(!files.length){
    return `<div class="empty-state"><span class="ic">📄</span>${defaultFolderId !== undefined ? '這個資料夾還沒有檔案。' : '沒有符合的檔案。'}</div>`;
  }
  return files.map((f, idx) => {
    const folderId = f._folderId !== undefined ? f._folderId : defaultFolderId;
    const isSearchResult = f._folderId !== undefined;
    return `
    <div class="file-row">
      <div class="ic">${f.type && f.type.startsWith('video') ? '🎞️' : (f.linkType==='link' ? '🔗' : '📄')}</div>
      <div class="meta">
        <div class="fname">${escapeHtml(f.name)} ${f._folderName ? `<span class="folder-chip">📁 ${escapeHtml(f._folderName)}</span>` : ''}</div>
        <div class="fsub">${f.linkType==='link' ? f.url : (f.tooLarge ? '檔案過大，僅記錄檔名・' + fmtSize(f.size) : fmtSize(f.size))} ・ ${fmtDate(f.date)}</div>
      </div>
      <div class="actions">
        ${!isSearchResult ? `
          <button class="btn small ghost" data-action="move-order-up" data-id="${f.id}" data-kind="${kind}" data-folder="${folderId}" title="上移" ${idx===0 ? 'disabled' : ''}>▲</button>
          <button class="btn small ghost" data-action="move-order-down" data-id="${f.id}" data-kind="${kind}" data-folder="${folderId}" title="下移" ${idx===files.length-1 ? 'disabled' : ''}>▼</button>
        ` : ''}
        ${f.linkType==='link'
          ? `<a class="btn small secondary" href="${escapeHtml(f.url)}" target="_blank" rel="noopener">開啟連結</a>`
          : `<button class="btn small secondary" data-action="download" data-id="${f.id}" data-kind="${kind}" data-folder="${folderId}" ${f.tooLarge ? 'disabled' : ''}>下載</button>`
        }
        <button class="btn small ghost" data-action="rename-file" data-id="${f.id}" data-kind="${kind}" data-folder="${folderId}" title="修改名稱">✏️</button>
        ${kind !== 'attendance' ? `<button class="btn small ghost" data-action="move-file" data-id="${f.id}" data-kind="${kind}" data-folder="${folderId}" title="移動到其他資料夾">📂</button>` : ''}
        <button class="btn small ghost" data-action="delete-file" data-id="${f.id}" data-kind="${kind}" data-folder="${folderId}">刪除</button>
      </div>
    </div>
  `;
  }).join('');
}

/* ============ shared file add logic ============ */
const MAX_INLINE_SIZE = 4 * 1024 * 1024; // 4MB

function readFileAsDataUrl(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(r.result);
    r.onerror = ()=> reject(new Error('讀取檔案失敗'));
    r.readAsDataURL(file);
  });
}

async function addFileToStore(kind, folderIdOrNull, file){
  const cloudMode = Backend.gasUrl && Backend.cloudReady;
  // 雲端模式檔案交給 Google 雲端硬碟保管，容量寬鬆很多；本機模式才需要 4MB 內嵌限制
  const tooLarge = !cloudMode && file.size > MAX_INLINE_SIZE;
  let dataUrl = null;
  if(!tooLarge){
    try{ dataUrl = await readFileAsDataUrl(file); }
    catch(e){ showToast('檔案讀取失敗：' + file.name, 'warn'); return; }
  }

  let entry = {
    id: genId(),
    name: file.name,
    size: file.size,
    type: file.type,
    date: new Date().toISOString(),
    dataUrl,
    driveFileId: null,
    tooLarge
  };

  if(cloudMode && dataUrl){
    try{
      showToast(`「${file.name}」上傳中…`);
      const result = await backendUploadFile(kind, resolveFolderName(kind, folderIdOrNull), file.name, dataUrl);
      entry.driveFileId = result.fileId;
      entry.dataUrl = null; // 內容已經在雲端硬碟，本機資料只留參照，避免資料庫爆量
      entry.tooLarge = false;
    }catch(e){
      showToast(`「${file.name}」雲端上傳失敗，將只暫存在本機：${e.message||e}`, 'warn');
    }
  }

  if(kind === 'papers'){
    state.papers.files[folderIdOrNull].push(entry);
    await storageSet('papers', state.papers);
  } else if(kind === 'videos'){
    state.videos.items[folderIdOrNull].push(entry);
    await storageSet('videos', state.videos);
  } else if(kind === 'attendance'){
    state.attendanceFiles.push(entry);
    await storageSet('attendance-files', state.attendanceFiles);
  }

  if(entry.tooLarge){
    showToast(`「${file.name}」超過 4MB，僅記錄檔名，無法下載。建議改用雲端同步或雲端連結。`, 'warn');
  } else {
    showToast(`「${file.name}」已上傳${entry.driveFileId ? '並同步到雲端硬碟' : ''}`);
  }
  render();
}

function resolveFolderName(kind, folderId){
  if(kind === 'attendance') return null;
  if(!folderId || folderId === ALL_ID) return null;
  const data = kind === 'papers' ? state.papers : state.videos;
  const f = data.folders.find(x => x.id === folderId);
  return f ? f.name : null;
}

async function moveFileOrder(kind, folderId, fileId, direction){
  let arr;
  if(kind === 'attendance'){
    arr = state.attendanceFiles;
  } else {
    const bucket = kind === 'papers' ? state.papers.files : state.videos.items;
    arr = bucket[folderId];
  }
  if(!arr) return;
  const idx = arr.findIndex(f=>f.id===fileId);
  const newIdx = idx + direction;
  if(idx < 0 || newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  if(kind === 'papers') await storageSet('papers', state.papers);
  else if(kind === 'videos') await storageSet('videos', state.videos);
  else await storageSet('attendance-files', state.attendanceFiles);
  render();
}

function promptMoveFile(kind, fromFolderId, fileId){
  const data = kind === 'papers' ? state.papers : state.videos;
  const bucket = kind === 'papers' ? state.papers.files : state.videos.items;
  const entry = (bucket[fromFolderId]||[]).find(f=>f.id===fileId);

  const allLabel = kind === 'papers' ? '全部試卷（未分類）' : '全部影片（未分類）';
  const options = [
    { id: ALL_ID, name: allLabel },
    ...data.folders.map(f => ({ id: f.id, name: getFolderPath(kind, f.id).map(p=>p.name).join(' / ') }))
  ].filter(f=>f.id !== fromFolderId);
  if(!options.length){ showToast('沒有其他資料夾可以移動','warn'); return; }
  openModal(`
    <h3>移動「${escapeHtml(entry.name)}」</h3>
    <p class="sub">選擇要移動到的資料夾</p>

      <button class="btn ghost" id="move-file-cancel">取消</button>
      <button class="btn" id="move-file-save">移動</button>
    </div>
  `);
  document.getElementById('move-file-cancel').onclick = closeModal;
  document.getElementById('move-file-save').onclick = async ()=>{
    const targetId = document.getElementById('move-file-target').value;
    bucket[fromFolderId] = (bucket[fromFolderId]||[]).filter(f=>f.id!==fileId);

async function downloadFile(entry){
  if(entry.driveFileId){
    try{
      showToast(`正在從雲端硬碟取得「${entry.name}」…`);
      const file = await backendDownloadFile(entry.driveFileId);
      const a = document.createElement('a');
      a.href = file.dataUrl;
      a.download = file.name || entry.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }catch(e){
      showToast('從雲端硬碟下載失敗：' + (e.message||e), 'warn');
    }
    return;
  }
  if(!entry.dataUrl){ showToast('此檔案過大，未儲存內容，無法下載','warn'); return; }
  const a = document.createElement('a');
  a.href = entry.dataUrl;
  a.download = entry.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

/* ---------- field-type sanity checks for CSV import ---------- */
const FIELD_SYNONYMS = {
  studentNo: ['學生編號','編號','學號'],
  enrollStatus: ['在班狀態','狀態','就讀狀態'],
  enrollStatusDate: ['狀態異動日期','異動日期','狀態日期'],
  zh: ['中文姓名','姓名','學生姓名','中文名'],
  en: ['英文姓名','英文名','英文'],
  school: ['就讀學校','學校','就讀之學校'],
  track: ['就讀管道','管道','學制'],
  grade: ['就讀年級','年級','班級'],
  birthday: ['生日','出生日期','生日期'],
  phone: ['學生電話','電話','學生手機','手機'],
  parentPhone: ['家長電話','家長手機','監護人電話','緊急聯絡電話'],
  note: ['備註','備注']
};
function mapCsvHeaderToFields(headerRow){
  const map = {};
  const trimmed = headerRow.map(c => (c||'').trim());
  // 第一輪：整欄標題文字須與同義詞完全相同才算數（避免「姓名」「電話」這類短字互相搶著比對）
  trimmed.forEach((v, idx)=>{
    if(!v || map[idx] !== undefined) return;
    for(const field of Object.keys(FIELD_SYNONYMS)){
      if(FIELD_SYNONYMS[field].includes(v)){ map[idx] = field; break; }
    }
  });
  // 第二輪：第一輪還沒配到的欄位，才放寬用「標題包含同義詞」模糊比對
  trimmed.forEach((v, idx)=>{
    if(!v || map[idx] !== undefined) return;
    for(const field of Object.keys(FIELD_SYNONYMS)){
      if(FIELD_SYNONYMS[field].some(n => v.includes(n))){ map[idx] = field; break; }
    }
  });
  return map;
}
function containsLetters(v){ return /[\u4e00-\u9fa5A-Za-z]/.test(v||''); }
function looksLikePhoneText(v){
  const s = (v||'').toString().trim();
  if(!s || containsLetters(s)) return false; // 含中文/英文字母就不可能是電話
  const digits = s.replace(/[^\d]/g,'');
  return digits.length >= 7 && digits.length <= 12;
}
function looksLikeDateText(v){
  const s = (v||'').toString().trim();
  return /^\d{2,4}[-/]\d{1,2}[-/]\d{1,2}$/.test(s);
}
function normalizeDateText(v){ return v.trim().replace(/\//g,'-'); }
function fuzzyMatchTrack(v){
  const s = (v||'').trim();
  if(['高中','高職','五專'].includes(s)) return s;
  if(s.includes('高中')) return '高中';
  if(s.includes('高職')) return '高職';
  if(s.includes('五專')) return '五專';
  return '';
}
function fuzzyMatchGrade(v){
  const s = (v||'').trim();
  if(GRADE_ORDER.includes(s)) return s;
  return GRADE_ORDER.find(g => s.includes(g)) || '';
}

async function importStudentRosterCsv(file){
  const text = await file.text();
  const lines = text.replace(/^\uFEFF/,'').split(/\r\n|\n/).filter(l => l.length);
  if(lines.length < 2){ showToast('CSV 內容不足，無法匯入','warn'); return; }

  const headerRow = parseCsvLine(lines[0]);
  let colMap = mapCsvHeaderToFields(headerRow);
  if(Object.keys(colMap).length < 3){
    // 標題列無法辨識，改用預設欄位順序（跟「匯出學生名冊」的格式一致）
    colMap = { 0:'studentNo', 1:'enrollStatus', 2:'enrollStatusDate', 3:'zh', 4:'en', 5:'school', 6:'track', 7:'grade', 8:'birthday', 9:'phone', 10:'parentPhone', 11:'note' };
  }

  let added = 0, skippedDup = 0, skippedNoName = 0, blankedFields = 0;
  const skippedNames = [];

  for(let i=1;i<lines.length;i++){
    const cols = parseCsvLine(lines[i]);
    const raw = {};
    Object.entries(colMap).forEach(([idx, field])=>{ raw[field] = (cols[idx]||'').trim(); });

    if(!raw.zh || looksLikePhoneText(raw.zh)){ skippedNoName++; continue; }

    const candidate = { zh: raw.zh };

    candidate.studentNo = raw.studentNo || generateStudentNo();

    candidate.enrollStatus = ENROLL_STATUS_OPTIONS.includes(raw.enrollStatus) ? raw.enrollStatus : '在班';
    if(raw.enrollStatus && candidate.enrollStatus !== raw.enrollStatus) blankedFields++;

    candidate.enrollStatusDate = looksLikeDateText(raw.enrollStatusDate) ? normalizeDateText(raw.enrollStatusDate) : '';

    candidate.en = (raw.en && !looksLikePhoneText(raw.en)) ? raw.en : '';
    if(raw.en && !candidate.en) blankedFields++;

    candidate.school = (raw.school && !looksLikePhoneText(raw.school) && !fuzzyMatchTrack(raw.school) && !GRADE_ORDER.includes(raw.school)) ? raw.school : '';
    if(raw.school && !candidate.school) blankedFields++;

    candidate.track = fuzzyMatchTrack(raw.track);
    if(raw.track && !candidate.track) blankedFields++;

    candidate.grade = fuzzyMatchGrade(raw.grade);
    if(raw.grade && !candidate.grade) blankedFields++;

    candidate.birthday = looksLikeDateText(raw.birthday) ? normalizeDateText(raw.birthday) : '';
    if(raw.birthday && !candidate.birthday) blankedFields++;

    candidate.phone = looksLikePhoneText(raw.phone) ? raw.phone.trim() : '';
    if(raw.phone && !candidate.phone) blankedFields++;

    candidate.parentPhone = looksLikePhoneText(raw.parentPhone) ? raw.parentPhone.trim() : '';
    if(raw.parentPhone && !candidate.parentPhone) blankedFields++;

    candidate.note = raw.note || '';

    const dup = findDuplicateStudent(candidate, null);
    if(dup){
      skippedDup++;
      skippedNames.push(raw.zh);
      continue;
    }
    state.students.push({ id: genId(), ...candidate, createdAt: new Date().toISOString() });
    added++;
  }

  await storageSet('students', state.students);
  render();

  const parts = [`已新增 ${added} 位學生`];
  if(skippedDup) parts.push(`${skippedDup} 筆偵測到重複已略過（${skippedNames.slice(0,5).join('、')}${skippedNames.length>5?' 等':''}）`);
  if(skippedNoName) parts.push(`${skippedNoName} 筆缺少有效姓名已跳過`);
  if(blankedFields) parts.push(`${blankedFields} 個欄位內容格式看起來不對（例如電話欄放了文字、學校欄放了電話），已自動留空避免存錯，請自行確認補齊`);
  showToast(parts.join('；'), (skippedDup || skippedNoName || blankedFields) ? 'warn' : undefined);
}

/* ============ CSV export / import ============ */
function csvField(v){
  const s = String(v==null?'':v);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
async function downloadCsvContent(csv, filename, backupFolderLabel){
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);

  if(Backend.gasUrl && Backend.cloudReady){
    try{
      const dataUrl = await new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onload = ()=> resolve(reader.result);
        reader.onerror = ()=> reject(new Error('讀取檔案失敗'));
        reader.readAsDataURL(blob);
      });
      await backendUploadFile('attendance', backupFolderLabel || null, filename, dataUrl);
      showToast(`「${filename}」已下載，並備份一份到雲端硬碟`);
    }catch(e){
      showToast(`「${filename}」已下載，但雲端備份失敗：${e.message||e}`, 'warn');
    }
  } else {
    showToast(`「${filename}」已下載`);
  }
}

function buildAttendanceCsvRows(students, dates){
  const rows = [];
  rows.push(['大洋周文理補習班｜點名總表']);
  rows.push(['班級/姓名','學生電話','家長電話', ...dates.map(d=>d.label), '備註']);
  GRADE_ORDER.concat([...new Set(students.map(s=>s.grade).filter(g=>!GRADE_ORDER.includes(g)))]).forEach(grade=>{
    const list = students.filter(s=>s.grade===grade);
    if(!list.length) return;
    rows.push([grade]);
    list.forEach(s=>{
      const rec = state.attendanceRecords[s.id] || {};
      rows.push([studentFullName(s), s.phone||'', s.parentPhone||'', ...dates.map(d=>rec[d.id]||''), s.note||'']);
    });
    rows.push([]);
  });
  return rows;
}

  const filename = `備份_點名總表${suffix}_${todayLabel().replace(/[（）]/g,'')}.csv`;

function parseCsvLine(line){
  const out = [];
  let cur = '', inQuotes = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(inQuotes){
      if(c === '"'){
        if(line[i+1] === '"'){ cur += '"'; i++; } else { inQuotes = false; }
      } else { cur += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ out.push(cur); cur=''; }
      else { cur += c; }
    }
  }
  out.push(cur);
  return out;
}

async function importAttendanceCsv(file){
  const text = await file.text();
  const lines = text.replace(/^\uFEFF/,'').split(/\r\n|\n/).filter(l => l.length);
  if(lines.length < 2){ showToast('CSV 內容不足，無法匯入','warn'); return; }
  const header = parseCsvLine(lines[0]);
  let dateLabels = [];
  let startRow = 1;
  // header row could be the title row or the real header row depending on file source
  if(header[0] && header[0].includes('點名')){
    const header2 = parseCsvLine(lines[1]);
    dateLabels = header2.slice(3, header2.length-1);
    startRow = 2;
  } else {
    dateLabels = header.slice(3, header.length-1);
    startRow = 1;
  }
  // map date labels to existing/new date columns
  const dateIdByLabel = {};
  state.attendanceDates.forEach(d => dateIdByLabel[d.label] = d.id);
  dateLabels.forEach(label=>{
    if(label && !dateIdByLabel[label]){
      const id = genId();
      dateIdByLabel[label] = id;
      state.attendanceDates.push({ id, label });
    }
  });

  let updated = 0, unmatched = [];
  for(let i=startRow;i<lines.length;i++){
    const cols = parseCsvLine(lines[i]);
    if(!cols[0] || !cols[0].trim()) continue; // blank separator row
    if(GRADE_ORDER.includes(cols[0].trim()) && !cols[1] && !cols[2]) continue; // grade header row
    const name = cols[0].trim();
    const student = state.students.find(s => studentFullName(s).trim() === name || s.zh.trim() === name);
    if(!student){ unmatched.push(name); continue; }
    dateLabels.forEach((label, idx)=>{
      if(!label) return;
      const val = cols[3+idx];
      if(val === undefined) return;
      if(!state.attendanceRecords[student.id]) state.attendanceRecords[student.id] = {};
      state.attendanceRecords[student.id][dateIdByLabel[label]] = val;
    });
    const noteVal = cols[3+dateLabels.length];
    if(noteVal !== undefined && noteVal.trim()) student.note = noteVal.trim();
    updated++;
  }

  await Promise.all([
    storageSet('attendance-dates', state.attendanceDates),
    storageSet('attendance-records', state.attendanceRecords),
    storageSet('students', state.students)
  ]);
  render();
  showToast(`已匯入，更新 ${updated} 位學生${unmatched.length ? '，' + unmatched.length + ' 筆姓名找不到對應學生' : ''}`, unmatched.length ? 'warn' : undefined);
}

    };
    profilePwSubmit.addEventListener('click', tryUnlock);
    profilePwInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') tryUnlock(); });
    profilePwInput.focus();
  }
  const lockProfileBtn = document.getElementById('lock-profile-btn');
  if(lockProfileBtn) lockProfileBtn.addEventListener('click', ()=>{
    state.profileUnlocked = false;
    state.profileSelectMode = false;
    state.selectedStudentIds = [];
    render();
  });

  document.querySelectorAll('[data-open-student]').forEach(card=>{
    card.addEventListener('click', ()=>{
      const id = card.dataset.openStudent;
      if(state.profileSelectMode){
        const idx = state.selectedStudentIds.indexOf(id);
        if(idx >= 0) state.selectedStudentIds.splice(idx,1);
        else state.selectedStudentIds.push(id);
        render();
      } else {
        openStudentModal(id);
      }
    });
    card.addEventListener('keydown', (e)=>{
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); card.click(); }
    });
  });
  const toggleSelectBtn = document.getElementById('toggle-select-mode-btn');
  if(toggleSelectBtn) toggleSelectBtn.addEventListener('click', ()=>{
    state.profileSelectMode = !state.profileSelectMode;
    state.selectedStudentIds = [];
    render();
  });
  const selectAllBtn = document.getElementById('select-all-students-btn');
  if(selectAllBtn) selectAllBtn.addEventListener('click', ()=>{
    const q = state.studentSearch.trim().toLowerCase();
    const visible = state.students.filter(s =>
      !q || s.zh.toLowerCase().includes(q) || (s.en||'').toLowerCase().includes(q) || (s.school||'').toLowerCase().includes(q)
    );
    state.selectedStudentIds = visible.map(s=>s.id);
    render();
  });
  const clearSelectBtn = document.getElementById('clear-select-students-btn');
  if(clearSelectBtn) clearSelectBtn.addEventListener('click', ()=>{
    state.selectedStudentIds = [];
    render();
  });
  const batchEditBtn = document.getElementById('batch-edit-students-btn');
  if(batchEditBtn) batchEditBtn.addEventListener('click', openBatchEditModal);
  const deleteSelectedBtn = document.getElementById('delete-selected-students-btn');
  if(deleteSelectedBtn) deleteSelectedBtn.addEventListener('click', ()=>{
    const ids = state.selectedStudentIds;
    if(!ids.length) return;
    const names = state.students.filter(s=>ids.includes(s.id)).map(s=>studentFullName(s));
    confirmDialog(
      `確定要刪除以下 ${ids.length} 位學生的資料嗎？此操作無法復原：${names.slice(0,8).join('、')}${names.length>8?' 等':''}`,
      async ()=>{
        state.students = state.students.filter(s=>!ids.includes(s.id));
        ids.forEach(id=> delete state.attendanceRecords[id]);
        await Promise.all([
          storageSet('students', state.students),
          storageSet('attendance-records', state.attendanceRecords)
        ]);
        state.selectedStudentIds = [];
        state.profileSelectMode = false;
        render();
        showToast(`已刪除 ${ids.length} 位學生的資料`);
      },
      `確定刪除這 ${ids.length} 位`
    );
  });
  const addStudentBtn = document.getElementById('add-student-btn');
  if(addStudentBtn) addStudentBtn.addEventListener('click', ()=> openStudentModal());
  const exportRosterBtn = document.getElementById('export-roster-csv-btn');
  if(exportRosterBtn) exportRosterBtn.addEventListener('click', exportStudentRosterCsv);
  const importRosterBtn = document.getElementById('import-roster-csv-btn');
  const importRosterInput = document.getElementById('import-roster-csv-input');
  if(importRosterBtn) importRosterBtn.addEventListener('click', ()=> importRosterInput.click());
  if(importRosterInput) importRosterInput.addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(file) await importStudentRosterCsv(file);
    e.target.value = '';
  });
  const searchInput = document.getElementById('student-search');
  if(searchInput) searchInput.addEventListener('input', (e)=>{
    state.studentSearch = e.target.value;
    render();
    document.getElementById('student-search').focus();
    const val = document.getElementById('student-search');
    val.selectionStart = val.selectionEnd = val.value.length;
  });
  const statusFilterSelect = document.getElementById('profile-status-filter');
  if(statusFilterSelect) statusFilterSelect.addEventListener('change', (e)=>{
    state.profileStatusFilter = e.target.value;
    render();
  });
  document.querySelectorAll('[data-action="delete-student"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.id;
      confirmDialog('確定要刪除這位學生的資料嗎？', async ()=>{
        state.students = state.students.filter(s=>s.id!==id);
        delete state.attendanceRecords[id];
        await Promise.all([
          storageSet('students', state.students),
          storageSet('attendance-records', state.attendanceRecords)
        ]);
        render();
        showToast('學生資料已刪除');
      });
    });
  });

  // attendance date columns + grid cells
  const addDateBtn = document.getElementById('add-date-btn');
  if(addDateBtn) addDateBtn.addEventListener('click', promptAddDateColumn);
  document.querySelectorAll('.date-del').forEach(btn=>{
    btn.addEventListener('click', ()=> deleteDateColumn(btn.dataset.date));
  });
  document.querySelectorAll('.att-cell').forEach(input=>{
    input.addEventListener('change', (e)=>{
      setAttendanceCell(input.dataset.student, input.dataset.date, e.target.value);
    });
  });
  document.querySelectorAll('.note-cell').forEach(input=>{
    input.addEventListener('change', (e)=>{
      setStudentNote(input.dataset.student, e.target.value);
    });
  });

  // csv export / import
  const exportCsvBtn = document.getElementById('export-csv-btn');
  if(exportCsvBtn) exportCsvBtn.addEventListener('click', openExportAttendanceModal);
  const importCsvBtn = document.getElementById('import-csv-btn');
  const importCsvInput = document.getElementById('import-csv-input');
  if(importCsvBtn) importCsvBtn.addEventListener('click', ()=> importCsvInput.click());
  if(importCsvInput) importCsvInput.addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(file) await importAttendanceCsv(file);
    e.target.value = '';
  });
}

/* ============ init ============ */
(async function init(){
  render(); // loading state
  await loadAll();
  render();
})();
</script>
</body>
</html>
