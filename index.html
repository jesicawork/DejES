<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>大洋周文理補習班｜國小資料庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lavender-bg:#EEE7F8;
    --lavender-deep:#9B7FC7;
    --lavender-line:#D9CBEF;
    --yellow-bg:#DCEAFA;
    --yellow-deep:#5B9BD5;
    --ink:#453659;
    --ink-soft:#7A6C93;
    --paper:#FFFFFF;
    --danger:#D9695F;
    --shadow: 0 8px 24px rgba(90,66,130,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Noto Sans TC",sans-serif;
    background:
      radial-gradient(circle at 15% 10%, rgba(240,201,74,0.18), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(155,127,199,0.16), transparent 45%),
      var(--lavender-bg);
    color:var(--ink);
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:"Noto Serif TC",serif;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--yellow-deep);color:var(--ink);}

  .app{
    display:flex;
    min-height:100vh;
    max-width:1280px;
    margin:0 auto;
  }

  /* ---------- Folder-tab side nav ---------- */
  .tabnav{
    width:112px;
    flex-shrink:0;
    padding:38px 0 20px 18px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .tabnav .brandmark{
    writing-mode:vertical-rl;
    font-family:"Noto Serif TC",serif;
    font-weight:900;
    font-size:13px;
    letter-spacing:4px;
    color:var(--lavender-deep);
    margin-bottom:10px;
    padding-left:4px;
  }
  .tab-btn{
    position:relative;
    border:none;
    text-align:left;
    padding:16px 10px 16px 16px;
    border-radius:14px 4px 4px 14px;
    font-size:14px;
    font-weight:700;
    color:var(--ink-soft);
    background:rgba(255,255,255,0.55);
    box-shadow:0 2px 6px rgba(90,66,130,0.08);
    transform:translateX(0) rotate(-0.4deg);
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    line-height:1.5;
  }
  .tab-btn .en{
    display:block;
    font-size:9px;
    letter-spacing:1.5px;
    font-weight:500;
    color:var(--ink-soft);
    opacity:.7;
    margin-top:2px;
  }
  .tab-btn:nth-child(2){ background:var(--yellow-bg); }
  .tab-btn:nth-child(3){ background:var(--lavender-bg); }
  .tab-btn:nth-child(4){ background:var(--yellow-bg); }
  .tab-btn:nth-child(5){ background:var(--lavender-bg); }
  .tab-btn:hover{ transform:translateX(6px) rotate(-0.4deg); }
  .tab-btn.active{
    background:var(--paper);
    color:var(--ink);
    transform:translateX(14px) rotate(0deg);
    box-shadow:var(--shadow);
    z-index:2;
  }
  .tab-btn.active::after{
    content:"";
    position:absolute;
    right:-14px; top:0; bottom:0; width:14px;
    background:var(--paper);
  }

  /* ---------- Main paper card ---------- */
  .main-wrap{
    flex:1;
    padding:32px 32px 32px 0;
    min-width:0;
  }
  .paper-card{
    position:relative;
    background:var(--paper);
    border-radius:6px 22px 22px 22px;
    box-shadow:var(--shadow);
    min-height:calc(100vh - 64px);
    padding:36px 40px;
    overflow:hidden;
  }
  .paper-card::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0; width:26px;
    background-image: radial-gradient(circle, var(--lavender-bg) 5px, transparent 5.5px);
    background-size: 26px 34px;
    background-position: 9px 20px;
    opacity:.9;
  }
  .paper-card > .content{
    margin-left:14px;
    animation: fadein .35s ease;
  }
  @keyframes fadein{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){
    .paper-card > .content{ animation:none; }
    .tab-btn{ transition:none; }
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:22px;
    gap:16px;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:3px;
    color:var(--lavender-deep);
    font-weight:700;
    margin:0 0 6px;
  }
  .page-title{
    font-size:28px;
    margin:0;
    color:var(--ink);
    font-weight:900;
  }
  .icon-btn{
    border:1px solid var(--lavender-line);
    background:var(--lavender-bg);
    color:var(--ink);
    width:38px;height:38px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex-shrink:0;
  }
  .icon-btn:hover{ background:var(--yellow-bg); }

  /* ---------- Home ---------- */
  .hero{
    background:linear-gradient(135deg, var(--yellow-bg), var(--paper) 60%);
    border:1px solid var(--yellow-deep);
    border-radius:20px;
    padding:34px 36px;
    margin-bottom:26px;
  }
  .hero h1{ font-size:34px; margin:0 0 6px; color:var(--ink); }
  .hero p{ margin:0; color:var(--ink-soft); font-size:15px; }
  .stat-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
    margin:26px 0;
  }
  .stat-card{
    background:var(--paper);
    border:1px solid var(--lavender-line);
    border-radius:16px;
    padding:18px 20px;
    position:relative;
  }
  .stat-card::before{
    content:"";
    position:absolute; top:-6px; left:20px;
    width:34px; height:12px;
    background:var(--yellow-deep);
    opacity:.6;
    border-radius:2px;
    transform:rotate(-3deg);
  }
  .stat-num{ font-family:"Noto Serif TC",serif; font-size:30px; font-weight:900; color:var(--lavender-deep); }
  .stat-label{ font-size:13px; color:var(--ink-soft); margin-top:2px; }

  .nav-cards{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .nav-card{
    border:1px solid var(--lavender-line);
    border-radius:16px;
    padding:22px 20px;
    background:var(--lavender-bg);
    transition:transform .15s ease, box-shadow .15s ease;
    text-align:left;
  }
  .nav-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow); }
  .nav-card h3{ margin:8px 0 4px; font-size:17px; }
  .nav-card p{ margin:0; font-size:13px; color:var(--ink-soft); line-height:1.6; }
  .nav-card .badge{
    display:inline-block; font-size:22px;
  }

  /* ---------- Layout: sidebar + list ---------- */
  .two-col{ display:flex; gap:24px; align-items:flex-start; }
  .folder-side{
    width:220px;
    flex-shrink:0;
    background:var(--lavender-bg);
    border-radius:16px;
    padding:16px;
  }
  .folder-side h4{ margin:0 0 10px; font-size:13px; letter-spacing:1px; color:var(--ink-soft); font-weight:700; }
  .folder-item{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 10px;
    border-radius:10px;
    font-size:14px;
    color:var(--ink);
    margin-bottom:4px;
  }
  .folder-item:hover{ background:rgba(255,255,255,.6); }
  .folder-item.active{ background:var(--paper); font-weight:700; box-shadow:0 2px 6px rgba(90,66,130,.1); }
  .folder-item .name{ flex:1; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .folder-item .del{ opacity:0; border:none; background:none; color:var(--danger); font-size:13px; padding:2px 4px; }
  .folder-item:hover .del{ opacity:.8; }
  .add-folder-btn{
    width:100%; margin-top:8px;
    border:1.5px dashed var(--lavender-deep);
    background:transparent;
    color:var(--lavender-deep);
    border-radius:10px;
    padding:8px;
    font-size:13px;
    font-weight:600;
  }
  .add-folder-btn:hover{ background:rgba(155,127,199,0.1); }
  .folder-item.pinned{
    font-weight:700; margin-bottom:10px; padding-bottom:9px;
    border-bottom:1.5px dashed var(--lavender-line);
    border-radius:10px 10px 0 0;
  }
  .folder-item.pinned.active{ box-shadow:none; background:rgba(255,255,255,.75); }

  .breadcrumb{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:12px; font-size:13px; }
  .breadcrumb .crumb{ cursor:pointer; color:var(--ink-soft); padding:3px 8px; border-radius:8px; }
  .breadcrumb .crumb:hover{ background:var(--lavender-bg); color:var(--ink); }
  .breadcrumb .crumb.current{ color:var(--lavender-deep); font-weight:700; cursor:default; }
  .breadcrumb .crumb.current:hover{ background:none; }
  .breadcrumb .crumb-sep{ color:var(--ink-soft); opacity:.6; }

  .folder-overview{ margin-top:22px; }
  .folder-overview h4{ margin:0 0 10px; font-size:13px; letter-spacing:1px; color:var(--ink-soft); font-weight:700; }
  .folder-card-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
  .folder-card{
    display:flex; flex-direction:column; gap:0;
    background:var(--paper); border:1.5px solid var(--lavender-line); border-radius:12px;
    overflow:hidden; transition:transform .15s ease, box-shadow .15s ease;
  }
  .folder-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--lavender-deep); }
  .folder-card-nav{
    display:flex; flex-direction:column; align-items:flex-start; gap:4px;
    padding:14px 14px 10px; text-align:left; background:none; width:100%;
  }
  .folder-card .ic{ font-size:20px; }
  .folder-card .name{ font-weight:700; font-size:14px; }
  .folder-card .count{ font-size:11px; color:var(--ink-soft); }
  .folder-card-actions{
    display:flex; justify-content:flex-end; gap:4px; padding:6px 10px;
    border-top:1px solid var(--lavender-line); background:rgba(155,127,199,0.05);
  }
  .folder-card-actions .del{ border:none; background:none; color:var(--ink-soft); font-size:13px; padding:2px 5px; }
  .folder-card-actions .del:hover{ color:var(--danger); }

  .folder-chip{
    display:inline-block; font-size:10px; font-weight:700; color:var(--lavender-deep);
    background:var(--lavender-bg); padding:2px 8px; border-radius:99px; margin-left:6px; vertical-align:middle;
  }

  .file-panel{ flex:1; min-width:0; }
  .file-panel-head{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px;
  }
  .file-panel-head h3{ margin:0; font-size:16px; }
  .btn{
    border:none; border-radius:10px; padding:9px 16px;
    font-size:13px; font-weight:700;
    background:var(--lavender-deep); color:#fff;
  }
  .btn:hover{ opacity:.9; }
  .btn.secondary{ background:var(--yellow-deep); color:var(--ink); }
  .btn.ghost{ background:var(--lavender-bg); color:var(--ink); }
  .btn.small{ padding:6px 12px; font-size:12px; }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  .file-row{
    display:flex; align-items:center; gap:14px;
    padding:12px 14px;
    border:1px solid var(--lavender-line);
    border-radius:12px;
    margin-bottom:10px;
    background:var(--paper);
  }
  .file-row .ic{ font-size:20px; width:28px; text-align:center; flex-shrink:0; }
  .file-row .meta{ flex:1; min-width:0; }
  .file-row .fname{ font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .file-row .fsub{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .file-row .actions{ display:flex; gap:6px; flex-shrink:0; }

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--ink-soft);
  }
  .empty-state .ic{ font-size:38px; display:block; margin-bottom:10px; }

  /* ---------- Attendance / student table ---------- */
  .toolbar{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .toolbar input[type=text]{
    flex:1; min-width:160px;
    padding:9px 12px; border-radius:10px; border:1px solid var(--lavender-line);
    font-size:13px; background:var(--lavender-bg);
  }
  table.student-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.student-table th{
    text-align:left; padding:10px 12px; color:var(--ink-soft);
    border-bottom:2px solid var(--lavender-line); font-weight:700; white-space:nowrap;
  }
  table.student-table td{ padding:10px 12px; border-bottom:1px solid var(--lavender-line); }
  table.student-table tr:hover td{ background:var(--lavender-bg); }
  .pill{ display:inline-block; padding:2px 10px; border-radius:99px; font-size:11px; font-weight:700; }

  /* ---------- Subject tags ---------- */
  .subject-tag{
    display:inline-block; font-size:10px; font-weight:700; color:#3D8461;
    background:#DCEFE2; padding:2px 9px; border-radius:99px; margin:2px 4px 0 0;
  }
  .subject-tag.subject-anqin{ color:#2F6690; background:var(--yellow-bg); }
  .id-masked{
    font-size:12px; color:var(--ink-soft); letter-spacing:1px;
  }

  /* ---------- Roster grid (attendance) ---------- */
  table.roster-grid{ table-layout:auto; }
  table.roster-grid th.date-col{ position:relative; padding-right:26px; }
  table.roster-grid th.date-col .date-del{
    position:absolute; right:4px; top:50%; transform:translateY(-50%);
    border:none; background:transparent; color:var(--ink-soft); font-size:11px;
    width:18px; height:18px; border-radius:50%; padding:0; line-height:18px;
  }
  table.roster-grid th.date-col .date-del:hover{ background:var(--danger); color:#fff; }
  table.roster-grid tr.grade-row td{
    background:linear-gradient(90deg, var(--lavender-deep), var(--yellow-deep));
    color:#fff; font-weight:900; font-family:"Noto Serif TC",serif; letter-spacing:2px;
    padding:8px 14px; border-bottom:none;
  }
  table.roster-grid tr.grade-row:first-child td{ border-radius:10px 10px 0 0; }
  .sub-meta{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .att-cell, .note-cell{
    width:64px; border:1px solid var(--lavender-line); border-radius:8px;
    padding:6px 8px; font-size:12px; font-family:inherit; background:var(--paper);
    color:var(--ink); text-align:center;
  }
  .note-cell{ width:130px; text-align:left; }
  .att-cell:focus, .note-cell:focus{ outline:none; border-color:var(--lavender-deep); box-shadow:0 0 0 3px rgba(155,127,199,0.2); }

  /* ---------- Sub tabs (student profile / attendance grid) ---------- */
  .sub-tabs{ display:flex; gap:8px; margin-top:24px; border-bottom:2px solid var(--lavender-line); }
  .sub-tab-btn{
    border:none; background:transparent; padding:10px 16px; font-size:14px; font-weight:700;
    color:var(--ink-soft); border-radius:10px 10px 0 0; position:relative; top:2px;
  }
  .sub-tab-btn.active{ background:var(--paper); color:var(--lavender-deep); box-shadow:0 -2px 8px rgba(90,66,130,0.06); }
  .sub-tab-btn:hover{ color:var(--ink); }

  /* ---------- Student profile cards ---------- */
  .profile-grade-block{ margin-top:20px; }
  .profile-grade-label{
    display:inline-block; font-family:"Noto Serif TC",serif; font-weight:900; font-size:14px;
    letter-spacing:2px; color:#fff; background:linear-gradient(90deg, var(--lavender-deep), var(--yellow-deep));
    padding:6px 16px; border-radius:8px; margin-bottom:10px;
  }
  .profile-card-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:12px; }
  .profile-card{
    text-align:left; background:var(--paper); border:1.5px solid var(--lavender-line); border-radius:14px;
    padding:14px 16px; display:flex; flex-direction:column; gap:5px; transition:transform .15s ease, box-shadow .15s ease;
    cursor:pointer;
  }
  .profile-card:hover{ transform:translateY(-2px); box-shadow:var(--shadow); border-color:var(--lavender-deep); }
  .profile-card .pc-name{ font-weight:700; font-size:15px; }
  .profile-card .pc-top-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .status-badge{
    flex-shrink:0; font-size:10px; font-weight:800; padding:2px 9px; border-radius:99px;
    white-space:nowrap;
  }
  .status-badge.status-active{ background:#DCEFE2; color:#3D8461; }
  .status-badge.status-new{ background:var(--yellow-bg); color:#2F6690; }
  .status-badge.status-transfer{ background:#E4DBFA; color:var(--lavender-deep); }
  .status-badge.status-left{ background:#F3E4E2; color:var(--danger); }
  .status-badge.status-grad{ background:#DCE9FA; color:#3D6B9A; }
  .profile-card .pc-meta{ font-size:12px; color:var(--ink-soft); }
  .profile-card .pc-phone{ font-size:12px; color:var(--ink); }
  .profile-card .pc-note{ font-size:11px; color:#2F6690; background:var(--yellow-bg); padding:3px 8px; border-radius:6px; margin-top:2px; }
  .profile-card .pc-subjects{ margin-top:2px; }

  .select-toolbar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    background:var(--lavender-bg); border-radius:12px; padding:10px 14px; margin-top:14px;
    font-size:13px; font-weight:600; color:var(--ink);
  }
  .profile-card.selectable{ cursor:pointer; padding-top:30px; position:relative; }
  .profile-card .pc-check{ position:absolute; top:10px; right:12px; font-size:16px; }
  .profile-card.selected{ border-color:var(--lavender-deep); background:#F4EFFC; box-shadow:0 0 0 2px rgba(155,127,199,0.25); }

  /* ---------- Profile lock screen ---------- */
  .lock-screen{ display:flex; justify-content:center; padding:40px 14px; }
  .lock-card{
    width:100%; max-width:320px; text-align:center; background:var(--paper);
    border:1.5px solid var(--lavender-line); border-radius:18px; padding:32px 24px;
    box-shadow:var(--shadow);
  }
  .lock-icon{ font-size:34px; margin-bottom:8px; }
  .lock-card h3{ margin:0 0 6px; font-size:17px; }
  .lock-card .sub{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }
  .lock-card input[type=password]{
    width:100%; padding:11px 14px; border-radius:10px; border:1.5px solid var(--lavender-line);
    font-size:16px; text-align:center; letter-spacing:3px; background:var(--lavender-bg); color:var(--ink);
  }
  .lock-error{ color:var(--danger); font-size:12px; margin-top:8px; height:16px; visibility:hidden; }
  .lock-error.show{ visibility:visible; }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(69,54,89,0.35);
    display:flex; align-items:center; justify-content:center; z-index:50;
    padding:20px;
  }
  .modal{
    background:var(--paper); border-radius:18px; padding:26px 28px;
    width:100%; max-width:460px; box-shadow:var(--shadow);
    max-height:88vh; overflow-y:auto;
  }
  .modal h3{ margin:0 0 4px; font-size:18px; }
  .modal .sub{ font-size:12px; color:var(--ink-soft); margin-bottom:16px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:5px; }
  .field input[type=text], .field input[type=tel], .field select, .field input[type=url], .field input[type=date], .field input[type=number]{
    width:100%; padding:9px 12px; border-radius:10px; border:1px solid var(--lavender-line);
    font-size:14px; background:var(--lavender-bg); color:var(--ink);
  }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
  .radio-group{ display:flex; gap:16px; margin-bottom:14px; }
  .radio-group label{ font-size:13px; display:flex; align-items:center; gap:5px; font-weight:600; }

  .checkbox-group{
    display:flex; flex-wrap:wrap; gap:10px 16px;
    background:var(--lavender-bg); border-radius:10px; padding:12px 14px;
  }
  .checkbox-group label{ font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; }

  .prev-score-section{ margin-top:6px; margin-bottom:16px; }
  .prev-score-section > summary{
    cursor:pointer; font-size:13px; font-weight:700; color:var(--lavender-deep);
    padding:8px 0; list-style:none;
  }
  .prev-score-section > summary::-webkit-details-marker{ display:none; }
  .prev-score-section > summary::before{ content:'▸ '; }
  .prev-score-section[open] > summary::before{ content:'▾ '; }
  .prev-score-grid{
    display:grid; grid-template-columns: 64px 1fr 1fr; gap:8px 10px;
    align-items:center; margin-top:6px;
  }
  .prev-score-grid .ps-label{ font-size:12px; font-weight:700; color:var(--ink-soft); }
  .prev-score-grid .ps-head{ font-size:11px; color:var(--ink-soft); text-align:center; }

  /* ---------- Toast ---------- */
  #toast-wrap{ position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:99; }
  .toast{
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:10px;
    font-size:13px; box-shadow:var(--shadow); animation:toastin .25s ease;
    max-width:320px;
  }
  .toast.warn{ background:#B4562C; }

<body>
<div id="app" class="app">

  <nav class="tabnav">
    <span class="brandmark">大洋周文理補習班</span>

    </div>

</div>

<div id="modal-root"></div>
<div id="toast-wrap"></div>

<script>
/* ============ backend: local (this browser) or cloud (Google Apps Script) ============ */
const LOCAL_PREFIX = 'dyzw_es_';
const GAS_URL_KEY = 'dyzw_es_gas_url';

/**
 * 把您部署好的 Apps Script 網址（結尾 /exec）填在下面雙引號中間，
 * 例如：const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycb.../exec';
 * 填好、存檔、上傳到 GitHub 後，任何人打開這個網站都會自動連到
 * 同一個共用後台，完全不用再手動設定「⚙️ 同步設定」這一步。
 * 留空 '' 則預設為每台裝置各自的本機模式，仍可在網頁裡手動設定。
 * 注意：國小資料庫請部署「另一個」全新的 Apps Script 專案／試算表，
 * 不要跟高中資料庫共用同一個網址，否則兩邊資料會混在一起。
 */
const DEFAULT_GAS_URL = '';
const Backend = {
  gasUrl: '',
  cache: null, // 雲端模式下，開頁時一次讀回來的完整資料
  cloudReady: false
};

async function initBackend(){
  Backend.gasUrl = localStorage.getItem(GAS_URL_KEY) || DEFAULT_GAS_URL;
  if(!Backend.gasUrl){
    Backend.cloudReady = false;
    return;
  }
  try{
    const res = await fetch(Backend.gasUrl + '?action=getAll');
    const json = await res.json();
    if(json && json.ok){
      Backend.cache = json.data || {};
      Backend.cloudReady = true;
    } else {
      throw new Error(json && json.error || '後端回應異常');
    }
  }catch(e){
    Backend.cloudReady = false;
    Backend.cache = {};
    showToast('連線 Google 後端失敗，暫時改用本機資料（不影響操作，但不會跨裝置同步）', 'warn');
  }
}

async function storageGet(key, fallback){
  if(Backend.gasUrl && Backend.cloudReady){
    return Object.prototype.hasOwnProperty.call(Backend.cache, key) ? Backend.cache[key] : fallback;
  }
  try{
    const raw = localStorage.getItem(LOCAL_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}

async function storageSet(key, value){
  if(Backend.gasUrl && Backend.cloudReady){
    Backend.cache[key] = value;
    try{
      await fetch(Backend.gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action:'set', key, value })
      });
      return true;
    }catch(e){
      showToast('同步到雲端失敗，請檢查網路連線','warn');
      return false;
    }
  }
  try{
    localStorage.setItem(LOCAL_PREFIX + key, JSON.stringify(value));
    return true;
  }catch(e){
    showToast('本機儲存空間已滿，建議清理部分資料或改用雲端同步','warn');
    return false;
  }
}

/**
 * 上傳檔案內容：雲端模式存進 Google 雲端硬碟（回傳 driveFileId）；
 * 本機模式回傳 null，檔案內容改為直接內嵌存在本機資料裡。
 */
async function backendUploadFile(kind, folderName, fileName, dataUrl){
  if(!(Backend.gasUrl && Backend.cloudReady)) return null;
  const res = await fetch(Backend.gasUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action:'uploadFile', kind, folderName, fileName, dataUrl })
  });
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || '上傳失敗');
  return json.result; // { fileId, name, size }
}

async function backendDownloadFile(driveFileId){
  const res = await fetch(Backend.gasUrl + '?action=getFile&id=' + encodeURIComponent(driveFileId));
  const json = await res.json();
  if(!json.ok) throw new Error(json.error || '下載失敗');
  return json.file; // { name, mimeType, dataUrl }
}

async function backendDeleteFile(driveFileId){
  if(!(Backend.gasUrl && Backend.cloudReady) || !driveFileId) return;
  try{
    await fetch(Backend.gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action:'deleteFile', fileId: driveFileId })
    });
  }catch(e){ /* 忽略刪除雲端檔案失敗，不影響網頁本身操作 */ }
}

/* ============ app state ============ */
const state = {
  view: 'home',
  papers: { folders: [], files: {} },
  videos: { folders: [], items: {} },
  attendanceFiles: [],
  students: [],
  attendanceDates: [],
  attendanceRecords: {},
  settings: { gasUrl: '' },
  activePaperFolder: null,
  activeVideoFolder: null,
  studentSearch: '',
  attendanceSubView: 'profile',
  sessions: [],
  activeSessionId: null,
  attendanceFileSearch: '',
  pendingAttendanceUploadCategory: '點名表',
  sessionPaymentFilter: '全部',
  paperSearch: '',
  videoSearch: '',
  profileSelectMode: false,
  selectedStudentIds: [],
  profileUnlocked: false,
  profileStatusFilter: '全部',
  profileSubjectFilter: '全部',
  profileViewMode: 'grade',
  customClasses: [],
  archives: [],
  loaded: false
};

/* 國小年級（取代高中版的高一～專五） */
const GRADE_ORDER = ['G1','G2','G3','G4','G5','G6'];
const ALL_ID = '__all__';
/* 建議之後在「設定」功能開放老師自行修改此密碼，目前先用固定值，記得部署前更換 */
const STUDENT_PROFILE_PASSWORD = '29646498';
const ENROLL_STATUS_OPTIONS = ['在班','新生','畢業生（銜接中）','轉出','退班'];
const PAYMENT_STATUS_OPTIONS = ['未繳','部分繳','已繳'];
const ATTENDANCE_CATEGORIES = ['點名表','學生檔案','梯次名冊','保險檔案'];

/* 補習科目（多選），安親班沒有對應的入班先備成績 */
const SUBJECT_OPTIONS = ['國語','數學','英文','自然','社會','安親班'];
/* 入班先備成績只問這 5 個學科，key 對應 prevScores 物件 */
const PREV_SCORE_SUBJECTS = [
  { key:'chinese', label:'國語' },
  { key:'math', label:'數學' },
  { key:'english', label:'英文' },
  { key:'science', label:'自然' },
  { key:'social', label:'社會' }
];

const STUDENT_NO_PREFIX = 'E'; // 國小專用前綴，避免跟高中資料庫的學生編號重複
function generateStudentNo(){
  const year = new Date().getFullYear();
  const prefixedYear = STUDENT_NO_PREFIX + year;
  const countThisYear = state.students.filter(s => s.studentNo && s.studentNo.startsWith(prefixedYear)).length;
  return `${prefixedYear}${String(countThisYear + 1).padStart(3,'0')}`;
}
function enrollStatusClass(status){
  if(status === '在班') return 'status-active';
  if(status === '新生') return 'status-new';
  if(status === '畢業生（銜接中）') return 'status-grad';
  if(status === '轉出') return 'status-transfer';
  if(status === '退班') return 'status-left';
  return 'status-active';
}
function todayLabel(){
  const d = new Date();
  const week = ['日','一','二','三','四','五','六'];
  return `${d.getMonth()+1}/${d.getDate()}（${week[d.getDay()]}）`;
}
function studentFullName(s){ return s.en ? `${s.zh} ${s.en}` : s.zh; }
function findDuplicateStudent(candidate, excludeId){
  const phone = (candidate.phone||'').trim();
  const zh = (candidate.zh||'').trim();
  const birthday = (candidate.birthday||'').trim();
  return state.students.find(s=>{
    if(excludeId && s.id === excludeId) return false;
    const phoneMatch = phone && (s.phone||'').trim() === phone;
    const nameBirthdayMatch = zh && birthday && (s.zh||'').trim() === zh && (s.birthday||'').trim() === birthday;
    return phoneMatch || nameBirthdayMatch;
  });
}

/* ---------- 學生異動歷程記錄 ---------- */
function addHistoryEntry(student, label){
  if(!student.history) student.history = [];
  student.history.push({ date: new Date().toISOString().slice(0,10), label });
}

/* ---------- subjects helpers ---------- */
function subjectsToText(arr){ return (arr||[]).join('、'); }
function textToSubjects(text){
  if(!text) return [];
  const parts = text.split(/[、,，\/\s]+/).map(s=>s.trim()).filter(Boolean);
  return parts.filter(p => SUBJECT_OPTIONS.includes(p));
}
function subjectTagClass(subj){ return subj === '安親班' ? 'subject-tag subject-anqin' : 'subject-tag'; }

/* 取得學生在某科目「實際上課的年級」：預設跟學生本身年級一樣，
   只有跳級/降級的科目才會有 subjectClassGrade 覆寫值 */
function getSubjectClassGrade(s, subject){
  return (s.subjectClassGrade && s.subjectClassGrade[subject]) || s.grade;
}

/* ---------- ID number helpers (身分證字號，需妥善保護) ---------- */
function looksLikeIdNumber(v){
  return /^[A-Za-z][0-9]{9}$/.test((v||'').trim());
}
function maskIdNumber(v){
  const s = (v||'').trim();
  if(!s) return '';
  if(s.length <= 4) return s[0] + '****';
  return s.slice(0,1) + '****' + s.slice(-3);
}

/* ---------- prev scores helpers ---------- */
function emptyPrevScores(){
  const obj = {};
  PREV_SCORE_SUBJECTS.forEach(s => { obj[s.key] = { mid:'', final:'' }; });
  return obj;
}
function getPrevScore(s, key, term){
  return (s.prevScores && s.prevScores[key] && s.prevScores[key][term] !== undefined) ? s.prevScores[key][term] : '';
}

function genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtSize(bytes){
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}
function fmtDate(iso){
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg, type){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'warn' ? ' warn' : '');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3600);
}

/* ============ load ============ */
async function loadAll(){
  await initBackend();
  const [papers, videos, attendanceFiles, students, attendanceDates, attendanceRecords, customClasses, sessions, archives] = await Promise.all([
    storageGet('papers', { folders: [], files: {} }),
    storageGet('videos', { folders: [], items: {} }),
    storageGet('attendance-files', []),
    storageGet('students', []),
    storageGet('attendance-dates', []),
    storageGet('attendance-records', {}),
    storageGet('custom-classes', ['G6私']),
    storageGet('sessions', []),
    storageGet('archives', [])
  ]);
  state.papers = papers;
  state.videos = videos;
  if(!state.papers.files[ALL_ID]) state.papers.files[ALL_ID] = [];
  if(!state.videos.items[ALL_ID]) state.videos.items[ALL_ID] = [];
  state.attendanceFiles = attendanceFiles;
  state.students = students;
  state.attendanceDates = attendanceDates;
  state.attendanceRecords = attendanceRecords;
  state.customClasses = customClasses;
  state.sessions = sessions;
  state.archives = archives;
  state.settings = { gasUrl: Backend.gasUrl, cloudReady: Backend.cloudReady };
  if(!state.activePaperFolder) state.activePaperFolder = ALL_ID;
  if(!state.activeVideoFolder) state.activeVideoFolder = ALL_ID;
  state.loaded = true;
}

/* ============ 每年7月：一鍵升年級 ============ */
function computePromotionSummary(){
  const active = state.students.filter(s => (s.enrollStatus||'在班') === '在班' || s.enrollStatus === '新生');
  const lastGrade = GRADE_ORDER[GRADE_ORDER.length - 1];
  const promoteCount = active.filter(s => GRADE_ORDER.includes(s.grade) && s.grade !== lastGrade).length;
  const graduateCount = active.filter(s => s.grade === lastGrade).length;
  const skippedCount = active.length - promoteCount - graduateCount; // 年級欄位是自訂值、不在 GRADE_ORDER 裡的學生，不會被自動升級
  return { promoteCount, graduateCount, skippedCount };
}

async function promoteAllGrades(){
  const active = state.students.filter(s => (s.enrollStatus||'在班') === '在班' || s.enrollStatus === '新生');
  const lastGrade = GRADE_ORDER[GRADE_ORDER.length - 1];
  const todayIso = new Date().toISOString().slice(0,10);

  await createArchiveSnapshot(String(new Date().getFullYear()) + '學年（升級前）');

  let promoted = 0, graduated = 0;
  active.forEach(s=>{
    const idx = GRADE_ORDER.indexOf(s.grade);
    if(idx === -1) return; // 自訂年級值，跳過不處理，避免誤動
    if(s.grade !== lastGrade){
      addHistoryEntry(s, `升年級：${s.grade} → ${GRADE_ORDER[idx+1]}`);
      s.grade = GRADE_ORDER[idx+1];
      promoted++;
    } else {
      addHistoryEntry(s, `畢業銜接：${s.enrollStatus||'在班'} → 畢業生（銜接中）`);
      s.enrollStatus = '畢業生（銜接中）';
      s.enrollStatusDate = todayIso;
      graduated++;
    }
  });
  await storageSet('students', state.students);
  render();
  showToast(`已自動建立升級前快照。升年級完成：${promoted} 位學生升了一個年級，${graduated} 位 ${lastGrade} 學生轉為「畢業生（銜接中）」`);
}

/* ============ 學年封存快照（唯讀備份，方便日後回查） ============ */
async function createArchiveSnapshot(label){
  const snapshot = {
    id: genId(),
    label: label || `${new Date().getFullYear()}學年`,
    createdAt: new Date().toISOString(),
    studentCount: state.students.length,
    students: JSON.parse(JSON.stringify(state.students))
  };
  state.archives = state.archives || [];
  state.archives.push(snapshot);
  await storageSet('archives', state.archives);
  return snapshot;
}

function exportArchiveSnapshotCsv(archiveId){
  const archive = state.archives.find(a=>a.id===archiveId);
  if(!archive) return;
  downloadCsv(`封存快照_${archive.label}_${todayLabel().replace(/[（）]/g,'')}.csv`, rowsToCsv(buildStudentRosterRows(archive.students)));
}

async function deleteArchiveSnapshot(archiveId){
  const archive = state.archives.find(a=>a.id===archiveId);
  if(!archive) return;
  confirmDialog(`確定要刪除「${archive.label}」這份封存快照嗎？刪除後無法復原。`, async ()=>{
    state.archives = state.archives.filter(a=>a.id!==archiveId);
    await storageSet('archives', state.archives);
    openSettingsModal();
    showToast('封存快照已刪除');
  }, '確定刪除');
}

/* ============ 自訂班級 ============ */
async function addCustomClass(name){
  if(!name || GRADE_ORDER.includes(name) || state.customClasses.includes(name)){
    if(name) showToast('這個班級名稱已經存在了','warn');
    return false;
  }
  state.customClasses.push(name);
  await storageSet('custom-classes', state.customClasses);
  document.querySelectorAll('select[id^="s-classgrade-"]').forEach(sel=>{
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    sel.appendChild(opt);
  });
  showToast(`已新增班級「${name}」，可以在下方選單選擇`);
  return true;
}

/* ============ modal helpers ============ */
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }
function openModal(html){
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal">${html}</div></div>`;
  document.getElementById('modal-overlay').addEventListener('click', (e)=>{
    if(e.target.id === 'modal-overlay') closeModal();
  });
}
function confirmDialog(message, onYes, confirmLabel){
  openModal(`
    <h3>確認操作</h3>
    <p class="sub" style="font-size:14px;color:var(--ink);margin-top:10px;">${escapeHtml(message)}</p>
    <div class="modal-actions">
      <button class="btn ghost" id="cd-cancel">取消</button>
      <button class="btn" id="cd-yes" style="background:var(--danger);">${escapeHtml(confirmLabel || '確定刪除')}</button>
    </div>
  `);
  document.getElementById('cd-cancel').onclick = closeModal;
  document.getElementById('cd-yes').onclick = ()=>{ closeModal(); onYes(); };
}

/* ============ nav ============ */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(state.view === 'attendance' && btn.dataset.view !== 'attendance'){
      state.profileUnlocked = false; // 離開學生檔案及點名表分頁時自動重新鎖定
    }
    state.view = btn.dataset.view;
    render();
  });
});

/* ============ render root ============ */
function render(){
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.view === state.view);
  });
  const c = document.getElementById('content');
  if(!state.loaded){
    c.innerHTML = `<div class="empty-state"><span class="ic">⏳</span>資料載入中…</div>`;
    return;
  }
  if(state.view === 'home') c.innerHTML = renderHome();
  else if(state.view === 'papers') c.innerHTML = renderPapers();
  else if(state.view === 'videos') c.innerHTML = renderVideos();
  else if(state.view === 'attendance') c.innerHTML = renderAttendance();
  bindViewEvents();
}

/* ============ HOME ============ */
function renderHome(){
  const paperCount = Object.values(state.papers.files).reduce((s,a)=>s+a.length,0);
  return `
    <div class="hero">
      <p class="eyebrow">國小資料庫｜Daiyang Academic Center</p>
      <h1>大洋周文理補習班</h1>
      <p>檔案與學生點名資料，一站管理。淡紫與鵝黃，是這間資料室的顏色。</p>
    </div>
    <div class="stat-row" style="grid-template-columns:repeat(2,1fr);max-width:520px;">
      <div class="stat-card"><div class="stat-num">${paperCount}</div><div class="stat-label">份檔案已建檔</div></div>
      <div class="stat-card"><div class="stat-num">${state.students.length}</div><div class="stat-label">位學生資料</div></div>
    </div>
    <div class="nav-cards" style="grid-template-columns:repeat(2,1fr);">
      <button class="nav-card" data-goto="papers"><span class="badge">🗂️</span><h3>檔案專區</h3><p>依科目、班別建立資料夾，上傳、下載、檢視各類講義與檔案。</p></button>
      <button class="nav-card" data-goto="attendance"><span class="badge">📋</span><h3>學生檔案及點名表</h3><p>查閱學生基本資料檔案、每日點名，並可串接 Google Apps Script 同步至 Excel。</p></button>
    </div>
  `;
}

/* ============ PAPERS ============ */
function getChildFolders(kind, parentId){
  const data = kind === 'papers' ? state.papers : state.videos;
  return data.folders.filter(f => (f.parentId || ALL_ID) === parentId);
}

function getFolderPath(kind, folderId){
  if(folderId === ALL_ID) return [];
  const data = kind === 'papers' ? state.papers : state.videos;
  const path = [];
  let current = data.folders.find(f=>f.id===folderId);
  const guard = new Set();
  while(current && !guard.has(current.id)){
    path.unshift(current);
    guard.add(current.id);
    const parentId = current.parentId || ALL_ID;
    if(parentId === ALL_ID) break;
    current = data.folders.find(f=>f.id===parentId);
  }
  return path;
}

function getDescendantFolderIds(kind, folderId){
  const ids = [];
  const walk = (pid)=>{
    getChildFolders(kind, pid).forEach(child=>{
      ids.push(child.id);
      walk(child.id);
    });
  };
  walk(folderId);
  return ids;
}

      <span class="name" data-action="select-folder">🗂️ ${allLabel}</span>

}

function searchFiles(kind, query){
  const q = query.trim().toLowerCase();
  if(!q) return null;
  const data = kind === 'papers' ? state.papers : state.videos;
  const bucket = kind === 'papers' ? data.files : data.items;
  const results = [];
  Object.keys(bucket).forEach(fid=>{
    const folderName = fid === ALL_ID
      ? (kind === 'papers' ? '全部檔案（未分類）' : '全部影片（未分類）')
      : (data.folders.find(f=>f.id===fid)?.name || '（資料夾已刪除）');
    (bucket[fid]||[]).forEach(f=>{
      if(f.name.toLowerCase().includes(q)){
        results.push(Object.assign({}, f, { _folderId: fid, _folderName: folderName }));
      }
    });
  });
  return results;
}

/* 依年級分組（原本的檢視方式） */
function renderProfileGroupsByGrade(students, selectMode){
  const groups = GRADE_ORDER.map(g => ({ label: g, list: students.filter(s => s.grade === g) })).filter(g => g.list.length);
  const otherGrades = [...new Set(students.map(s=>s.grade).filter(g=>!GRADE_ORDER.includes(g)))];
  otherGrades.forEach(g => groups.push({ label: g, list: students.filter(s=>s.grade===g) }));
  if(!groups.length) return `<div class="empty-state" style="margin-top:14px;"><span class="ic">🧑‍🎓</span>還沒有學生資料，點選「新增學生」開始建檔。</div>`;
  return groups.map(grp => `
    <div class="profile-grade-block">
      <div class="profile-grade-label">${escapeHtml(grp.label)}</div>
      <div class="profile-card-grid">
        ${grp.list.map(s => renderStudentCard(s, selectMode)).join('')}
      </div>
    </div>
  `).join('');
}

/* 依補習科目分班，班內再依年級（實際上課年級，若有跳級/降級會用調整後的年級）排列 */
function renderProfileGroupsBySubject(students, selectMode){
  const sections = SUBJECT_OPTIONS.map(subject => {
    const inSubject = students.filter(s => (s.subjects||[]).includes(subject));
    if(!inSubject.length) return null;
    const gradeGroups = GRADE_ORDER.map(g => ({
      label: g,
      list: inSubject.filter(s => getSubjectClassGrade(s, subject) === g)
    })).filter(g => g.list.length);
    const otherGrades = [...new Set(inSubject.map(s=>getSubjectClassGrade(s, subject)).filter(g=>!GRADE_ORDER.includes(g)))];
    otherGrades.forEach(g => gradeGroups.push({ label: g, list: inSubject.filter(s=>getSubjectClassGrade(s, subject)===g) }));
    return { subject, gradeGroups, count: inSubject.length };
  }).filter(Boolean);
  if(!sections.length) return `<div class="empty-state" style="margin-top:14px;"><span class="ic">🧑‍🎓</span>沒有符合條件的學生資料。</div>`;
  return sections.map(sec => `
    <div class="profile-grade-block">
      <div class="profile-grade-label">${escapeHtml(sec.subject)} 班（共 ${sec.count} 人）</div>
      ${sec.gradeGroups.map(grp => `
        <div style="margin:10px 0 10px 4px;">
          <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;">${escapeHtml(grp.label)}${grp.list.some(s=>getSubjectClassGrade(s, sec.subject) !== s.grade) ? '　<span style="color:var(--danger);">（含跳級／降級學生）</span>' : ''}</div>
          <div class="profile-card-grid">
            ${grp.list.map(s => renderStudentCard(s, selectMode)).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderAttendanceGrid(){
  const q = state.studentSearch.trim().toLowerCase();
  const students = state.students.filter(s =>
    !q || s.zh.toLowerCase().includes(q) || (s.en||'').toLowerCase().includes(q) || (s.school||'').toLowerCase().includes(q)
  );
  const dates = state.attendanceDates;
  const groups = GRADE_ORDER.map(g => ({ grade: g, list: students.filter(s => s.grade === g) }))
    .filter(g => g.list.length);
  const otherGrades = [...new Set(students.map(s=>s.grade).filter(g=>!GRADE_ORDER.includes(g)))];
  otherGrades.forEach(g => groups.push({ grade: g, list: students.filter(s=>s.grade===g) }));

  const colCount = 3 + dates.length; // 姓名, 家長電話, ...dates, 備註

  return `

/* ============ 梯次名冊（寒暑假營隊／衝刺班） ============ */
const SESSION_TYPE_OPTIONS = ['暑假營隊','寒假營隊','衝刺班','其他'];

function getSession(sessionId){
  return state.sessions.find(sess => sess.id === sessionId);
}
function paymentStatusOf(session, studentId){
  return (session.payments && session.payments[studentId]) || '未繳';
}

function renderSessionsView(){
  const session = state.activeSessionId ? getSession(state.activeSessionId) : null;
  if(session) return renderSessionDetail(session);
  return renderSessionsList();
}

function renderSessionsList(){
  const sessions = [...state.sessions].sort((a,b)=> String(b.year||'').localeCompare(String(a.year||'')) || (b.createdAt||'').localeCompare(a.createdAt||''));
  return `
    <div style="margin-top:26px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <h3 style="margin:0;font-size:16px;">梯次名冊</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn secondary" id="add-session-btn">＋ 新增梯次</button>
        ${sessions.length ? `<button class="btn ghost" id="backup-sessions-btn">💾 備份所有梯次</button>` : ''}
      </div>
    </div>
    <p class="helper-note" style="margin-top:10px;">💡 梯次名冊用來管理寒暑假營隊或衝刺班：每個梯次有自己的名單、繳費狀態、跟自己的點名表，跟平常的科目補習點名分開，互不影響。</p>
    ${sessions.length ? `
      <div class="profile-card-grid" style="margin-top:16px;">
        ${sessions.map(sess => `
          <div class="profile-card" data-open-session="${sess.id}" role="button" tabindex="0">
            <div class="pc-top-row">
              <div class="pc-name">${escapeHtml(sess.name)}</div>
              <span class="status-badge status-transfer">${escapeHtml(sess.type||'其他')}</span>
            </div>
            <div class="pc-meta">${escapeHtml(sess.year||'')}年度</div>
            <div class="pc-meta">👥 ${(sess.studentIds||[]).length} 人</div>
            ${sess.note ? `<div class="pc-note">📝 ${escapeHtml(sess.note)}</div>` : ''}
          </div>
        `).join('')}

}

  const colCount = 4 + dates.length;
  const counts = { '未繳':0, '部分繳':0, '已繳':0 };
  allStudents.forEach(s => { counts[paymentStatusOf(session, s.id)] = (counts[paymentStatusOf(session, s.id)]||0) + 1; });

        <button class="btn ghost" id="export-session-csv-btn">⬇ 匯出梯次名冊(CSV)</button>
        <button class="btn ghost" id="export-session-insurance-csv-btn">⬇ 匯出保險名冊(CSV)</button>
        <button class="btn secondary" id="backup-session-btn">💾 備份此梯次</button>
        <button class="btn" id="delete-session-btn" style="background:var(--danger);">🗑 刪除梯次</button>
      </div>
    </div>
    ${session.note ? `<p class="helper-note">📝 ${escapeHtml(session.note)}</p>` : ''}
    <div class="stat-row" style="grid-template-columns:repeat(3,1fr);max-width:520px;margin-top:16px;">
      <div class="stat-card" data-payment-quickfilter="未繳" style="cursor:pointer;${paymentFilter==='未繳'?`border-color:var(--danger);box-shadow:0 0 0 2px rgba(217,105,95,0.25);`:''}"><div class="stat-num" style="color:var(--danger);">${counts['未繳']}</div><div class="stat-label">未繳</div></div>
      <div class="stat-card" data-payment-quickfilter="部分繳" style="cursor:pointer;${paymentFilter==='部分繳'?`border-color:#2F6690;box-shadow:0 0 0 2px rgba(47,102,144,0.2);`:''}"><div class="stat-num" style="color:#2F6690;">${counts['部分繳']}</div><div class="stat-label">部分繳</div></div>
      <div class="stat-card" data-payment-quickfilter="已繳" style="cursor:pointer;${paymentFilter==='已繳'?`border-color:#3D8461;box-shadow:0 0 0 2px rgba(61,132,97,0.2);`:''}"><div class="stat-num" style="color:#3D8461;">${counts['已繳']}</div><div class="stat-label">已繳</div></div>
    </div>
    <div class="toolbar" style="margin-top:14px;max-width:320px;">
      <select id="session-payment-filter" style="padding:9px 12px;border-radius:10px;border:1px solid var(--lavender-line);background:var(--lavender-bg);font-size:13px;">
        ${['全部', ...PAYMENT_STATUS_OPTIONS].map(o=>`<option ${paymentFilter===o?'selected':''}>${o}</option>`).join('')}
      </select>
    </div>
    <div style="overflow-x:auto;margin-top:10px;">
      <table class="student-table roster-grid">
        <thead>
          <tr>
            <th>姓名</th><th>年級</th><th>家長電話</th><th>繳費狀態</th>
            ${dates.map(d => `<th class="date-col"><span>${escapeHtml(d.label)}</span><button class="date-del" data-session-date="${d.id}" title="刪除此日期欄">✕</button></th>`).join('')}
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${students.length ? students.map(s => `
            <tr>
              <td>${escapeHtml(studentFullName(s))}</td>
              <td>${escapeHtml(s.grade||'')}</td>
              <td>${escapeHtml(s.parentPhone||'—')}</td>
              <td>
                <select class="session-payment-select" data-session-student="${s.id}" style="padding:6px 8px;border-radius:8px;border:1px solid var(--lavender-line);background:var(--paper);font-size:12px;">
                  ${PAYMENT_STATUS_OPTIONS.map(o=>`<option ${paymentStatusOf(session, s.id)===o?'selected':''}>${o}</option>`).join('')}
                </select>

        </tbody>
      </table>

}

function promptCreateSession(){
  openModal(`
    <h3>新增梯次</h3>
    <div class="field"><label>梯次名稱</label><input type="text" id="sess-name" placeholder="例如：2026暑假營隊" autofocus></div>
    <div class="field-row">
      <div class="field">
        <label>類型</label>
        <select id="sess-type">${SESSION_TYPE_OPTIONS.map(o=>`<option>${o}</option>`).join('')}<option value="__custom__">自訂...</option></select>
      </div>
      <div class="field"><label>年度</label><input type="text" id="sess-year" value="${new Date().getFullYear()}"></div>
    </div>
    <div class="field" id="sess-type-custom-field" style="display:none;"><label>自訂類型名稱</label><input type="text" id="sess-type-custom" placeholder="例如：週末棋藝營"></div>
    <div class="field"><label>備註</label><input type="text" id="sess-note" placeholder="選填"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="sess-cancel">取消</button>
      <button class="btn" id="sess-save">新增</button>
    </div>
  `);
  document.getElementById('sess-type').addEventListener('change', (e)=>{
    document.getElementById('sess-type-custom-field').style.display = e.target.value === '__custom__' ? 'block' : 'none';
  });
  document.getElementById('sess-cancel').onclick = closeModal;
  document.getElementById('sess-save').onclick = async ()=>{
    const name = document.getElementById('sess-name').value.trim();
    if(!name){ showToast('請輸入梯次名稱','warn'); return; }
    const typeSel = document.getElementById('sess-type').value;
    const type = typeSel === '__custom__' ? document.getElementById('sess-type-custom').value.trim() : typeSel;
    if(typeSel === '__custom__' && !type){ showToast('請輸入自訂類型名稱','warn'); return; }
    const session = {
      id: genId(),
      name,
      type,
      year: document.getElementById('sess-year').value.trim(),
      note: document.getElementById('sess-note').value.trim(),
      studentIds: [],
      payments: {},
      attendanceDates: [],
      attendanceRecords: {},
      createdAt: new Date().toISOString()
    };
    state.sessions.push(session);
    await storageSet('sessions', state.sessions);
    state.activeSessionId = session.id;
    closeModal();
    render();
    showToast('梯次已新增，接著可以按「管理名單」加入學生');
  };
}

function deleteSession(sessionId){
  const session = getSession(sessionId);
  if(!session) return;
  confirmDialog(`確定要刪除梯次「${session.name}」嗎？這只會刪除這個梯次的名單／繳費／點名紀錄，不會刪除學生本身的資料。`, async ()=>{
    state.sessions = state.sessions.filter(s=>s.id!==sessionId);
    await storageSet('sessions', state.sessions);
    state.activeSessionId = null;
    render();
    showToast('梯次已刪除');
  }, '確定刪除');
}

/* ============ shared file add logic ============ */
const MAX_INLINE_SIZE = 4 * 1024 * 1024; // 4MB

function readFileAsDataUrl(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(r.result);
    r.onerror = ()=> reject(new Error('讀取檔案失敗'));
    r.readAsDataURL(file);
  });
}

async function addFileToStore(kind, folderIdOrNull, file){
  const cloudMode = Backend.gasUrl && Backend.cloudReady;
  // 雲端模式檔案交給 Google 雲端硬碟保管，容量寬鬆很多；本機模式才需要 4MB 內嵌限制
  const tooLarge = !cloudMode && file.size > MAX_INLINE_SIZE;
  let dataUrl = null;
  if(!tooLarge){
    try{ dataUrl = await readFileAsDataUrl(file); }
    catch(e){ showToast('檔案讀取失敗：' + file.name, 'warn'); return; }
  }

  let entry = {
    id: genId(),
    name: file.name,
    size: file.size,
    type: file.type,
    date: new Date().toISOString(),
    dataUrl,
    driveFileId: null,
    tooLarge
  };
  if(kind === 'attendance'){
    entry.category = folderIdOrNull || '點名表';
  }

  if(cloudMode && dataUrl){
    try{
      showToast(`「${file.name}」上傳中…`);
      const result = await backendUploadFile(kind, resolveFolderName(kind, folderIdOrNull), file.name, dataUrl);
      entry.driveFileId = result.fileId;
      entry.dataUrl = null; // 內容已經在雲端硬碟，本機資料只留參照，避免資料庫爆量
      entry.tooLarge = false;
    }catch(e){
      showToast(`「${file.name}」雲端上傳失敗，將只暫存在本機：${e.message||e}`, 'warn');
    }
  }

  if(kind === 'papers'){
    state.papers.files[folderIdOrNull].push(entry);
    await storageSet('papers', state.papers);
  } else if(kind === 'videos'){
    state.videos.items[folderIdOrNull].push(entry);
    await storageSet('videos', state.videos);
  } else if(kind === 'attendance'){
    state.attendanceFiles.push(entry);
    await storageSet('attendance-files', state.attendanceFiles);
  }

  if(entry.tooLarge){
    showToast(`「${file.name}」超過 4MB，僅記錄檔名，無法下載。建議改用雲端同步或雲端連結。`, 'warn');
  } else {
    showToast(`「${file.name}」已上傳${entry.driveFileId ? '並同步到雲端硬碟' : ''}`);
  }
  render();
}

function resolveFolderName(kind, folderId){
  if(kind === 'attendance') return folderId || null;
  if(!folderId || folderId === ALL_ID) return null;
  const data = kind === 'papers' ? state.papers : state.videos;
  const f = data.folders.find(x => x.id === folderId);
  return f ? f.name : null;
}

/* ============ 一鍵備份：把匯出的 CSV 直接存進「點名表檔案」（雲端模式＝真的存進雲端硬碟） ============ */
async function saveCsvToAttendanceArchive(filename, csvBody, category){
  const csv = '\uFEFF' + csvBody;
  const base64 = btoa(unescape(encodeURIComponent(csv)));
  const dataUrl = 'data:text/csv;charset=utf-8;base64,' + base64;
  const cloudMode = Backend.gasUrl && Backend.cloudReady;
  let entry = {
    id: genId(),
    name: filename,
    size: csv.length,
    type: 'text/csv',
    date: new Date().toISOString(),
    dataUrl,
    driveFileId: null,
    tooLarge: false,
    category: category || '點名表'
  };
  if(cloudMode){
    try{
      const result = await backendUploadFile('attendance', category || '點名表', filename, dataUrl);
      entry.driveFileId = result.fileId;
      entry.dataUrl = null;
    }catch(e){
      showToast(`「${filename}」雲端上傳失敗，將只暫存在本機：${e.message||e}`, 'warn');
    }
  }
  state.attendanceFiles.push(entry);
}

async function moveFileOrder(kind, folderId, fileId, direction){
  let arr;
  if(kind === 'attendance'){
    arr = state.attendanceFiles;
  } else {
    const bucket = kind === 'papers' ? state.papers.files : state.videos.items;
    arr = bucket[folderId];
  }
  if(!arr) return;
  const idx = arr.findIndex(f=>f.id===fileId);
  const newIdx = idx + direction;
  if(idx < 0 || newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  if(kind === 'papers') await storageSet('papers', state.papers);
  else if(kind === 'videos') await storageSet('videos', state.videos);
  else await storageSet('attendance-files', state.attendanceFiles);
  render();
}

function promptMoveFolder(kind, folderId){
  const data = kind === 'papers' ? state.papers : state.videos;
  const folder = data.folders.find(f=>f.id===folderId);
  if(!folder) return;
  const blocked = new Set([folderId, ...getDescendantFolderIds(kind, folderId)]);
  const currentParent = folder.parentId || ALL_ID;
  const allLabel = kind === 'papers' ? '全部檔案（頂層）' : '全部影片（頂層）';
  const options = [
    { id: ALL_ID, name: allLabel },
    ...data.folders.filter(f => !blocked.has(f.id)).map(f => ({ id: f.id, name: getFolderPath(kind, f.id).map(p=>p.name).join(' / ') }))
  ].filter(o => o.id !== currentParent);
  if(!options.length){ showToast('沒有可以移動過去的資料夾','warn'); return; }
  openModal(`
    <h3>移動「${escapeHtml(folder.name)}」</h3>
    <p class="sub">選擇要移動到哪個資料夾底下（無法移動到自己或自己的子資料夾裡）</p>
    <div class="field">
      <label>目的資料夾</label>
      <select id="move-folder-target">
        ${options.map(o=>`<option value="${o.id}">${escapeHtml(o.name)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="move-folder-cancel">取消</button>
      <button class="btn" id="move-folder-save">移動</button>
    </div>
  `);
  document.getElementById('move-folder-cancel').onclick = closeModal;
  document.getElementById('move-folder-save').onclick = async ()=>{
    const targetId = document.getElementById('move-folder-target').value;
    folder.parentId = targetId;
    await storageSet(kind === 'papers' ? 'papers' : 'videos', data);
    closeModal();
    render();
    showToast('資料夾已移動');
  };
}

function promptMoveFile(kind, fromFolderId, fileId){
  const data = kind === 'papers' ? state.papers : state.videos;
  const bucket = kind === 'papers' ? state.papers.files : state.videos.items;
  const entry = (bucket[fromFolderId]||[]).find(f=>f.id===fileId);
  if(!entry) return;
  const allLabel = kind === 'papers' ? '全部檔案（未分類）' : '全部影片（未分類）';
  const options = [
    { id: ALL_ID, name: allLabel },
    ...data.folders.map(f => ({ id: f.id, name: getFolderPath(kind, f.id).map(p=>p.name).join(' / ') }))
  ].filter(f=>f.id !== fromFolderId);
  if(!options.length){ showToast('沒有其他資料夾可以移動','warn'); return; }
  openModal(`
    <h3>移動「${escapeHtml(entry.name)}」</h3>
    <p class="sub">選擇要移動到的資料夾</p>
    <div class="field">
      <label>目的資料夾</label>
      <select id="move-file-target">
        ${options.map(f=>`<option value="${f.id}">${escapeHtml(f.name)}</option>`).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="move-file-cancel">取消</button>
      <button class="btn" id="move-file-save">移動</button>
    </div>
  `);
  document.getElementById('move-file-cancel').onclick = closeModal;
  document.getElementById('move-file-save').onclick = async ()=>{
    const targetId = document.getElementById('move-file-target').value;
    bucket[fromFolderId] = (bucket[fromFolderId]||[]).filter(f=>f.id!==fileId);
    if(!bucket[targetId]) bucket[targetId] = [];
    bucket[targetId].push(entry);
    await storageSet(kind === 'papers' ? 'papers' : 'videos', data);
    closeModal();
    render();
    showToast('已移動');
  };
}

async function downloadFile(entry){
  if(entry.driveFileId){
    try{
      showToast(`正在從雲端硬碟取得「${entry.name}」…`);
      const file = await backendDownloadFile(entry.driveFileId);
      const a = document.createElement('a');
      a.href = file.dataUrl;
      a.download = file.name || entry.name;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }catch(e){
      showToast('從雲端硬碟下載失敗：' + (e.message||e), 'warn');
    }
    return;
  }
  if(!entry.dataUrl){ showToast('此檔案過大，未儲存內容，無法下載','warn'); return; }
  const a = document.createElement('a');
  a.href = entry.dataUrl;
  a.download = entry.name;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

    if(!zh){ showToast('請輸入中文姓名','warn'); return; }
    const idNumberVal = document.getElementById('s-idnumber').value.trim().toUpperCase();

      showToast('身分證字號格式看起來不對（應為1碼英文字母＋9碼數字），請確認後再儲存','warn');
      return;

    const subjectClassGrade = {};
    SUBJECT_OPTIONS.filter(sub=>sub!=='安親班').forEach(sub=>{
      const el = document.getElementById(`s-classgrade-${sub}`);
      const val = el ? el.value : '';
      if(val) subjectClassGrade[sub] = val;
    });
    const newPrevScores = {};
    PREV_SCORE_SUBJECTS.forEach(ps=>{
      newPrevScores[ps.key] = {
        mid: document.getElementById(`s-prev-${ps.key}-mid`).value.trim(),
        final: document.getElementById(`s-prev-${ps.key}-final`).value.trim()
      };
    });
    const fields = {
      zh,
      en: document.getElementById('s-en').value.trim(),
      idNumber: idNumberVal,
      school: document.getElementById('s-school').value.trim(),
      grade: document.getElementById('s-grade').value,
      subjects: selectedSubjects,
      subjectClassGrade,
      birthday: document.getElementById('s-birthday').value,

      parentPhone: document.getElementById('s-parent-phone').value.trim(),
      note: document.getElementById('s-note').value.trim(),
      studentNo: document.getElementById('s-studentno').value.trim() || generateStudentNo(),
      enrollStatus: document.getElementById('s-enroll-status').value,
      enrollStatusDate: document.getElementById('s-enroll-date').value,
      prevScores: newPrevScores
    };
    const dup = findDuplicateStudent(fields, editing ? studentId : null);
    const proceedSave = async ()=>{
      if(editing){
        if(fields.enrollStatus !== (s.enrollStatus||'在班')){
          addHistoryEntry(s, `狀態變更：${s.enrollStatus||'在班'} → ${fields.enrollStatus}`);
        }
        if(fields.grade !== s.grade){
          addHistoryEntry(s, `年級調整：${s.grade||''} → ${fields.grade}`);
        }
        Object.assign(s, fields);
        await storageSet('students', state.students);
        closeModal();
        render();
        showToast('學生資料已更新');
      } else {
        const student = { id: genId(), ...fields, createdAt: new Date().toISOString(), history: [] };
        addHistoryEntry(student, `建檔（${fields.enrollStatus}）`);
        state.students.push(student);
        await storageSet('students', state.students);
        closeModal();
        render();
        showToast('學生已新增');
      }
    };
    if(dup){
      confirmDialog(`系統偵測到「${studentFullName(dup)}」（${dup.grade||''}）的手機號碼或「姓名+生日」與此筆相同，可能是重複資料。確定仍要儲存這筆嗎？`, proceedSave, '仍要儲存');
    } else {
      await proceedSave();
    }
  };
}

function promptBatchSubjects(mode){
  const ids = state.selectedStudentIds;
  if(!ids.length) return;
  openModal(`
    <h3>批次${mode==='add'?'加選':'退選'}科目</h3>
    <p class="sub">將套用到已選取的 ${ids.length} 位學生</p>
    <div class="checkbox-group">
      ${SUBJECT_OPTIONS.map(sub=>`<label><input type="checkbox" name="batch-subject" value="${escapeHtml(sub)}"> ${escapeHtml(sub)}</label>`).join('')}
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="batch-cancel">取消</button>
      <button class="btn" id="batch-save">套用</button>
    </div>
  `);
  document.getElementById('batch-cancel').onclick = closeModal;
  document.getElementById('batch-save').onclick = async ()=>{
    const chosen = Array.from(document.querySelectorAll('input[name="batch-subject"]:checked')).map(el=>el.value);
    if(!chosen.length){ showToast('請至少勾選一個科目','warn'); return; }
    state.students.forEach(s=>{
      if(!ids.includes(s.id)) return;
      const current = s.subjects || [];
      let updated;
      if(mode === 'add'){
        updated = [...new Set([...current, ...chosen])];
      } else {
        updated = current.filter(sub=>!chosen.includes(sub));
      }
      if(updated.length !== current.length || updated.some(x=>!current.includes(x))){
        addHistoryEntry(s, `批次${mode==='add'?'加選':'退選'}科目：${chosen.join('、')}`);
        s.subjects = updated;
      }
    });
    await storageSet('students', state.students);
    closeModal();
    render();
    showToast(`已為 ${ids.length} 位學生${mode==='add'?'加選':'退選'}：${chosen.join('、')}`);
  };
}

/* ---------- field-type sanity checks for CSV import ---------- */
const FIELD_SYNONYMS = {
  studentNo: ['學生編號','編號','學號'],
  enrollStatus: ['在班狀態','狀態','就讀狀態'],
  enrollStatusDate: ['狀態異動日期','異動日期','狀態日期'],
  zh: ['中文姓名','姓名','學生姓名','中文名'],
  en: ['英文姓名','英文名','英文'],
  idNumber: ['身分證字號','身分證','身份證字號'],
  school: ['就讀學校','學校','就讀之學校'],
  grade: ['就讀年級','年級','班級'],
  subjects: ['補習科目','科目'],
  birthday: ['生日','出生日期','生日期'],
  phone: ['學生電話','電話','學生手機','手機'],
  parentPhone: ['家長電話','家長手機','監護人電話','緊急聯絡電話'],
  note: ['備註','備注'],
  prevScore_chinese_mid: ['國語期中'],
  prevScore_chinese_final: ['國語期末'],
  prevScore_math_mid: ['數學期中'],
  prevScore_math_final: ['數學期末'],
  prevScore_english_mid: ['英文期中'],
  prevScore_english_final: ['英文期末'],
  prevScore_science_mid: ['自然期中'],
  prevScore_science_final: ['自然期末'],
  prevScore_social_mid: ['社會期中'],
  prevScore_social_final: ['社會期末']
};
function mapCsvHeaderToFields(headerRow){
  const map = {};
  const trimmed = headerRow.map(c => (c||'').trim());
  // 第一輪：整欄標題文字須與同義詞完全相同才算數（避免「姓名」「電話」這類短字互相搶著比對）
  trimmed.forEach((v, idx)=>{
    if(!v || map[idx] !== undefined) return;
    for(const field of Object.keys(FIELD_SYNONYMS)){
      if(FIELD_SYNONYMS[field].includes(v)){ map[idx] = field; break; }
    }
  });
  // 第二輪：第一輪還沒配到的欄位，才放寬用「標題包含同義詞」模糊比對
  trimmed.forEach((v, idx)=>{
    if(!v || map[idx] !== undefined) return;
    for(const field of Object.keys(FIELD_SYNONYMS)){
      if(FIELD_SYNONYMS[field].some(n => v.includes(n))){ map[idx] = field; break; }
    }
  });
  return map;
}
function containsLetters(v){ return /[\u4e00-\u9fa5A-Za-z]/.test(v||''); }
function looksLikePhoneText(v){
  const s = (v||'').toString().trim();
  if(!s || containsLetters(s)) return false; // 含中文/英文字母就不可能是電話
  const digits = s.replace(/[^\d]/g,'');
  return digits.length >= 7 && digits.length <= 12;
}
function looksLikeDateText(v){
  const s = (v||'').toString().trim();
  return /^\d{2,4}[-/]\d{1,2}[-/]\d{1,2}$/.test(s);
}
function looksLikeScoreText(v){
  const s = (v||'').toString().trim();
  if(!s) return true; // 允許留空
  const n = Number(s);
  return !isNaN(n) && n >= 0 && n <= 100;
}
function normalizeDateText(v){ return v.trim().replace(/\//g,'-'); }
function fuzzyMatchGrade(v){
  const s = (v||'').trim();
  if(GRADE_ORDER.includes(s)) return s;
  return GRADE_ORDER.find(g => s.includes(g)) || '';
}

async function importStudentRosterCsv(file){
  const text = await file.text();
  const lines = text.replace(/^\uFEFF/,'').split(/\r\n|\n/).filter(l => l.length);
  if(lines.length < 2){ showToast('CSV 內容不足，無法匯入','warn'); return; }

  const headerRow = parseCsvLine(lines[0]);
  let colMap = mapCsvHeaderToFields(headerRow);
  if(Object.keys(colMap).length < 3){
    // 標題列無法辨識，改用預設欄位順序（跟「匯出學生名冊」的格式一致）
    colMap = { 0:'studentNo', 1:'enrollStatus', 2:'enrollStatusDate', 3:'zh', 4:'en', 5:'school', 6:'grade',
      7:'subjects', 8:'phone', 9:'parentPhone', 10:'note',
      11:'prevScore_chinese_mid', 12:'prevScore_chinese_final', 13:'prevScore_math_mid', 14:'prevScore_math_final',
      15:'prevScore_english_mid', 16:'prevScore_english_final', 17:'prevScore_science_mid', 18:'prevScore_science_final',
      19:'prevScore_social_mid', 20:'prevScore_social_final' };
  }

  let added = 0, skippedDup = 0, skippedNoName = 0, blankedFields = 0;
  const skippedNames = [];

  for(let i=1;i<lines.length;i++){
    const cols = parseCsvLine(lines[i]);
    const raw = {};
    Object.entries(colMap).forEach(([idx, field])=>{ raw[field] = (cols[idx]||'').trim(); });

    if(!raw.zh || looksLikePhoneText(raw.zh)){ skippedNoName++; continue; }

    const candidate = { zh: raw.zh };

    candidate.studentNo = raw.studentNo || generateStudentNo();

    candidate.enrollStatus = ENROLL_STATUS_OPTIONS.includes(raw.enrollStatus) ? raw.enrollStatus : '在班';
    if(raw.enrollStatus && candidate.enrollStatus !== raw.enrollStatus) blankedFields++;

    candidate.enrollStatusDate = looksLikeDateText(raw.enrollStatusDate) ? normalizeDateText(raw.enrollStatusDate) : '';

    candidate.en = (raw.en && !looksLikePhoneText(raw.en)) ? raw.en : '';
    if(raw.en && !candidate.en) blankedFields++;

    candidate.idNumber = looksLikeIdNumber(raw.idNumber) ? raw.idNumber.toUpperCase() : '';
    if(raw.idNumber && !candidate.idNumber) blankedFields++;

    candidate.school = (raw.school && !looksLikePhoneText(raw.school) && !GRADE_ORDER.includes(raw.school)) ? raw.school : '';
    if(raw.school && !candidate.school) blankedFields++;

    candidate.grade = fuzzyMatchGrade(raw.grade);
    if(raw.grade && !candidate.grade) blankedFields++;

    candidate.subjects = textToSubjects(raw.subjects);
    if(raw.subjects && !candidate.subjects.length) blankedFields++;

    candidate.birthday = looksLikeDateText(raw.birthday) ? normalizeDateText(raw.birthday) : '';
    if(raw.birthday && !candidate.birthday) blankedFields++;

    candidate.phone = looksLikePhoneText(raw.phone) ? raw.phone.trim() : '';
    if(raw.phone && !candidate.phone) blankedFields++;

    candidate.parentPhone = looksLikePhoneText(raw.parentPhone) ? raw.parentPhone.trim() : '';
    if(raw.parentPhone && !candidate.parentPhone) blankedFields++;

    candidate.note = raw.note || '';

    candidate.prevScores = {};
    PREV_SCORE_SUBJECTS.forEach(ps=>{
      const midRaw = raw[`prevScore_${ps.key}_mid`] || '';
      const finalRaw = raw[`prevScore_${ps.key}_final`] || '';
      const mid = looksLikeScoreText(midRaw) ? midRaw : '';
      const final = looksLikeScoreText(finalRaw) ? finalRaw : '';
      if((midRaw && !mid) || (finalRaw && !final)) blankedFields++;
      candidate.prevScores[ps.key] = { mid, final };
    });

    const dup = findDuplicateStudent(candidate, null);
    if(dup){
      skippedDup++;
      skippedNames.push(raw.zh);
      continue;
    }
    state.students.push({ id: genId(), ...candidate, createdAt: new Date().toISOString() });
    added++;
  }

  await storageSet('students', state.students);
  render();

  const parts = [`已新增 ${added} 位學生`];
  if(skippedDup) parts.push(`${skippedDup} 筆偵測到重複已略過（${skippedNames.slice(0,5).join('、')}${skippedNames.length>5?' 等':''}）`);
  if(skippedNoName) parts.push(`${skippedNoName} 筆缺少有效姓名已跳過`);
  if(blankedFields) parts.push(`${blankedFields} 個欄位內容格式看起來不對，已自動留空避免存錯，請自行確認補齊`);
  showToast(parts.join('；'), (skippedDup || skippedNoName || blankedFields) ? 'warn' : undefined);
}

function parseCsvLine(line){
  const out = [];
  let cur = '', inQuotes = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(inQuotes){
      if(c === '"'){
        if(line[i+1] === '"'){ cur += '"'; i++; } else { inQuotes = false; }
      } else { cur += c; }
    } else {
      if(c === '"'){ inQuotes = true; }
      else if(c === ','){ out.push(cur); cur=''; }
      else { cur += c; }
    }
  }
  out.push(cur);
  return out;
}

async function importAttendanceCsv(file){
  const text = await file.text();
  const lines = text.replace(/^\uFEFF/,'').split(/\r\n|\n/).filter(l => l.length);
  if(lines.length < 2){ showToast('CSV 內容不足，無法匯入','warn'); return; }
  const header = parseCsvLine(lines[0]);
  let dateLabels = [];
  let startRow = 1;
  // header row could be the title row or the real header row depending on file source
  if(header[0] && header[0].includes('點名')){
    const header2 = parseCsvLine(lines[1]);
    dateLabels = header2.slice(2, header2.length-1);
    startRow = 2;
  } else {
    dateLabels = header.slice(2, header.length-1);
    startRow = 1;
  }
  // map date labels to existing/new date columns
  const dateIdByLabel = {};
  state.attendanceDates.forEach(d => dateIdByLabel[d.label] = d.id);
  dateLabels.forEach(label=>{
    if(label && !dateIdByLabel[label]){
      const id = genId();
      dateIdByLabel[label] = id;
      state.attendanceDates.push({ id, label });
    }
  });

  let updated = 0, unmatched = [];
  for(let i=startRow;i<lines.length;i++){
    const cols = parseCsvLine(lines[i]);
    if(!cols[0] || !cols[0].trim()) continue; // blank separator row
    if(GRADE_ORDER.includes(cols[0].trim()) && !cols[1]) continue; // grade header row
    const name = cols[0].trim();
    const student = state.students.find(s => studentFullName(s).trim() === name || s.zh.trim() === name);
    if(!student){ unmatched.push(name); continue; }
    dateLabels.forEach((label, idx)=>{
      if(!label) return;
      const val = cols[2+idx];
      if(val === undefined) return;
      if(!state.attendanceRecords[student.id]) state.attendanceRecords[student.id] = {};
      state.attendanceRecords[student.id][dateIdByLabel[label]] = val;
    });
    const noteVal = cols[2+dateLabels.length];
    if(noteVal !== undefined && noteVal.trim()) student.note = noteVal.trim();
    updated++;
  }

  await Promise.all([
    storageSet('attendance-dates', state.attendanceDates),
    storageSet('attendance-records', state.attendanceRecords),
    storageSet('students', state.students)
  ]);
  render();
  showToast(`已匯入，更新 ${updated} 位學生${unmatched.length ? '，' + unmatched.length + ' 筆姓名找不到對應學生' : ''}`, unmatched.length ? 'warn' : undefined);
}
